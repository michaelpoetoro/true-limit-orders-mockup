<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eToro — Limit Orders · Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   eToro Design System v2 — Limit Orders Prototype
   ============================================================ */
:root {
  --color-bg:               #F5F7FA;
  --color-surface:          #FFFFFF;
  --color-surface-inset:    #F0F2F7;
  --color-text-primary:     #1A1C24;
  --color-text-secondary:   #5A6178;
  --color-text-muted:       #9299AE;
  --color-border:           #DFE3EE;
  --color-border-strong:    #C4CAD9;
  --color-brand:            #0EB12E;
  --color-brand-hover:      #0A9824;
  --color-brand-bg:         #E7F7EB;
  --color-negative:         #F23D40;
  --color-negative-bg:      #FDECEC;
  --color-warning:          #F4A100;
  --color-warning-bg:       #FEF3D9;
  --color-blue:             #2A84F7;
  --color-blue-bg:          #E8F1FE;
  --x1:4px;--x2:8px;--x3:12px;--x4:16px;--x5:20px;--x6:24px;--x8:32px;--x10:40px;
  --radius-xs:4px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-full:9999px;
  --shadow-1:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.04);
  --shadow-2:0 4px 8px -2px rgba(16,24,40,.08),0 2px 4px -2px rgba(16,24,40,.04);
  --shadow-3:0 12px 32px -4px rgba(16,24,40,.14),0 4px 8px -2px rgba(16,24,40,.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
[data-theme="dark"] {
  --color-bg:#0E1014;--color-surface:#16191F;--color-surface-inset:#0E1014;
  --color-text-primary:#FFFFFF;--color-text-secondary:#B8BDCC;--color-text-muted:#717890;
  --color-border:#2A2F3E;--color-border-strong:#424966;
  --color-brand:#2ECC4E;--color-brand-hover:#26B545;--color-brand-bg:rgba(46,204,78,.13);
  --color-negative:#E95550;--color-negative-bg:rgba(233,85,80,.13);
  --color-warning:#FFB832;--color-warning-bg:rgba(255,184,50,.12);
  --color-blue:#5AA3FF;--color-blue-bg:rgba(90,163,255,.13);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{font-family:var(--font);background:var(--color-bg);color:var(--color-text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}

/* ============================================================
   PROTOTYPE SHELL
   ============================================================ */
.proto-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top bar */
.proto-bar {
  position: sticky; top: 0; z-index: 200;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: 0 var(--x6);
  display: flex; align-items: center; gap: var(--x4); height: 52px;
}
.proto-logo {
  display: flex; align-items: center; gap: var(--x2);
  font-weight: 700; font-size: 16px;
}
.proto-logo-mark {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--color-brand);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 900; font-size: 12px;
}
.proto-title {
  font-size: 13px; font-weight: 600; color: var(--color-text-secondary);
  margin-left: var(--x2);
}
.proto-badge {
  padding: 3px 8px; border-radius: var(--radius-full);
  font-size: 10px; font-weight: 700; letter-spacing: .3px;
  background: var(--color-warning-bg); color: var(--color-warning);
}
.proto-bar-right { margin-left: auto; display: flex; align-items: center; gap: var(--x3); }
.theme-btn {
  width: 30px; height: 30px; border-radius: var(--radius-full);
  background: var(--color-surface-inset);
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.theme-btn:hover { background: var(--color-border); }

/* ============================================================
   STEP NAV
   ============================================================ */
.step-nav {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: 0 var(--x6);
  display: flex; align-items: center; gap: 0;
  overflow-x: auto; scrollbar-width: none;
}
.step-nav::-webkit-scrollbar { display: none; }
.step-item {
  display: flex; align-items: center; gap: var(--x2);
  padding: var(--x3) var(--x3);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all .15s; flex-shrink: 0;
}
.step-item:hover { background: var(--color-surface-inset); }
.step-item.active { border-bottom-color: var(--color-brand); }
.step-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--color-surface-inset); border: 1.5px solid var(--color-border);
  font-size: 10px; font-weight: 700; color: var(--color-text-muted);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .15s;
}
.step-item.active .step-num,
.step-item.visited .step-num {
  background: var(--color-brand); border-color: var(--color-brand); color: #fff;
}
.step-label { font-size: 12px; font-weight: 500; color: var(--color-text-muted); }
.step-item.active .step-label { color: var(--color-text-primary); font-weight: 600; }
.step-item.visited .step-label { color: var(--color-text-secondary); }
.step-arrow { font-size: 10px; color: var(--color-border-strong); padding: 0 var(--x1); }

/* ============================================================
   STAGE
   ============================================================ */
.proto-stage {
  flex: 1;
  display: flex; align-items: flex-start; justify-content: center;
  padding: var(--x8) var(--x6);
  gap: var(--x8);
}

/* Phone frame */
.phone-wrap {
  display: flex; flex-direction: column; align-items: center; gap: var(--x5);
}
.phone-frame {
  width: 375px; flex-shrink: 0;
  background: #1C1C1E;
  border-radius: 44px;
  border: 2px solid #3A3A3C;
  box-shadow: 0 0 0 1px rgba(255,255,255,.06) inset, 0 0 0 1px rgba(255,255,255,.06), 0 12px 40px rgba(0,0,0,.6), 0 2px 4px rgba(255,255,255,.08) inset;
  overflow: hidden;
  position: relative;
  background: linear-gradient(180deg, #3A3A3C 0%, #2C2C2E 50%, #3A3A3C 100%);
}
.phone-notch {
  width: 120px; height: 30px;
  background: var(--color-text-primary);
  border-radius: 0 0 18px 18px;
  margin: 0 auto;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.notch-bar { width: 48px; height: 4px; border-radius: 3px; background: rgba(255,255,255,.25); }
.notch-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.2); }
.phone-screen {
  background: var(--color-bg);
  min-height: 680px;
  position: relative;
  overflow: hidden;
}
/* Screen slide transition */
.screen-content {
  position: relative;
}
.screen-content.slide-in-right {
  animation: slideInRight .25s cubic-bezier(.4,0,.2,1) both;
}
.screen-content.slide-in-left {
  animation: slideInLeft .25s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideInRight {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes slideInLeft {
  from { transform: translateX(-40px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}

/* Prev/Next nav */
.phone-nav {
  display: flex; align-items: center; gap: var(--x4);
}
.nav-btn {
  width: 44px; height: 44px; border-radius: var(--radius-full);
  background: var(--color-surface); border: 1.5px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; box-shadow: var(--shadow-1);
  transition: all .15s; color: var(--color-text-secondary);
}
.nav-btn:hover:not(:disabled) {
  background: var(--color-text-primary); color: var(--color-surface);
  border-color: var(--color-text-primary);
}
.nav-btn:disabled { opacity: .3; cursor: default; }
.step-counter {
  font-size: 12px; font-weight: 600; color: var(--color-text-muted);
  min-width: 60px; text-align: center;
}
.step-dots {
  display: flex; gap: 5px; align-items: center;
}
.step-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-border-strong); transition: all .2s;
}
.step-dot.active {
  width: 18px; border-radius: 3px; background: var(--color-brand);
}

/* Annotation panel */
.annotation-panel {
  width: 300px; flex-shrink: 0; padding-top: var(--x3);
}
.ann-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: var(--x5);
  box-shadow: var(--shadow-1);
}
.ann-screen-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: var(--radius-full);
  font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
  background: var(--color-blue-bg); color: var(--color-blue);
  margin-bottom: var(--x3);
}
.ann-title { font-size: 15px; font-weight: 700; margin-bottom: var(--x2); }
.ann-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: var(--x4); }
.ann-points { list-style: none; display: flex; flex-direction: column; gap: var(--x2); }
.ann-points li {
  display: flex; gap: var(--x2); font-size: 12px; color: var(--color-text-secondary); line-height: 1.5;
}
.ann-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--color-brand); color: #fff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.ann-dot.warn { background: var(--color-warning); }
.ann-dot.blue { background: var(--color-blue); }
.ann-cta {
  margin-top: var(--x4); padding-top: var(--x4); border-top: 1px solid var(--color-border);
  font-size: 12px; color: var(--color-text-muted);
  display: flex; align-items: center; gap: var(--x2);
}

/* ============================================================
   MOBILE APP COMPONENTS (shared)
   ============================================================ */
.app-bar {
  background: var(--color-surface); padding: var(--x3) var(--x4);
  display: flex; align-items: center; border-bottom: 1px solid var(--color-border); gap: var(--x3);
}
.back-btn {
  width: 30px; height: 30px; border-radius: var(--radius-full);
  background: var(--color-surface-inset); display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--color-text-secondary); flex-shrink: 0; cursor: pointer;
}
.bar-title { font-size: 15px; font-weight: 700; flex: 1; }
.bar-sub { font-size: 11px; color: var(--color-text-secondary); }
.icon-btn {
  width: 30px; height: 30px; border-radius: var(--radius-full);
  background: var(--color-surface-inset);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.asset-strip {
  background: var(--color-surface); padding: var(--x3) var(--x4) var(--x2);
  display: flex; align-items: center; gap: var(--x3);
  border-bottom: 1px solid var(--color-border);
}
.asset-logo {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg,#0052b4,#0095e8);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.asset-name { font-size: 14px; font-weight: 700; }
.asset-sub { font-size: 11px; color: var(--color-text-secondary); }
.asset-price-col { margin-left: auto; text-align: right; }
.asset-price { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.asset-change { font-size: 11px; font-weight: 600; }
.up { color: var(--color-brand); }
.down { color: var(--color-negative); }

.seg-wrap { padding: var(--x3) var(--x4) var(--x2); background: var(--color-surface); }
.seg {
  display: flex; background: var(--color-surface-inset);
  border-radius: var(--radius-md); padding: 3px; gap: 2px;
}
.seg button {
  flex: 1; padding: 7px; border-radius: 9px;
  font-size: 13px; font-weight: 500; color: var(--color-text-secondary); transition: all .15s;
}
.seg button.active {
  background: var(--color-surface); color: var(--color-text-primary);
  font-weight: 700; box-shadow: var(--shadow-1);
}
.seg button.active.buy { color: var(--color-brand); }
.seg button.active.sell { color: var(--color-negative); }

.order-tabs-wrap {
  padding: var(--x3) var(--x4); background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
}
.order-tabs { display: flex; background: var(--color-surface-inset); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
.order-tab {
  flex: 1; padding: 7px var(--x2); border-radius: 7px;
  font-size: 12px; font-weight: 500; color: var(--color-text-secondary);
  text-align: center; cursor: pointer; transition: all .15s;
}
.order-tab.active {
  background: var(--color-surface); color: var(--color-text-primary); font-weight: 600;
  box-shadow: var(--shadow-1);
}
.order-tab.tlo-active {
  background: var(--color-brand-bg) !important; color: var(--color-brand) !important;
  box-shadow: none !important;
}
.order-tab-label { font-size: 12px; font-weight: 600; }
.order-tab-hint { font-size: 10px; color: var(--color-text-muted); margin-top: 1px; }
.order-tab.tlo-active .order-tab-hint { color: color-mix(in srgb, var(--color-brand) 65%, transparent); }

.form-sec { background: var(--color-surface); padding: var(--x4); margin-top: 1px; }
.form-row { margin-bottom: var(--x4); }
.form-label {
  font-size: 10px; font-weight: 700; color: var(--color-text-secondary);
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: var(--x2);
  display: flex; justify-content: space-between; align-items: center;
}
.form-hint { font-size: 10px; color: var(--color-text-muted); text-transform: none; letter-spacing: 0; font-weight: 400; }
.input-wrap { position: relative; }
.input-f { cursor: text;
  width: 100%; height: 46px; border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm); background: var(--color-surface);
  font-size: 16px; font-weight: 700; color: var(--color-text-primary);
  padding: 0 var(--x3) 0 28px; outline: none; font-variant-numeric: tabular-nums;
  transition: border-color .15s;
}
.input-f.shares { padding-left: var(--x3); padding-right: 52px; }
.input-f.focused { border-color: var(--color-brand); box-shadow: 0 0 0 3px rgba(14,177,46,.15); }
.input-f.error { border-color: var(--color-negative); }
.input-pre {
  position: absolute; left: var(--x2); top: 50%; transform: translateY(-50%);
  font-size: 14px; font-weight: 600; color: var(--color-text-muted); pointer-events: none;
}
.input-suf {
  position: absolute; right: var(--x3); top: 50%; transform: translateY(-50%);
  font-size: 11px; font-weight: 600; color: var(--color-text-muted); pointer-events: none;
}
.chips { display: flex; gap: var(--x2); margin-top: var(--x2); flex-wrap: wrap; }
.chip {
  padding: 4px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 500;
  background: var(--color-surface-inset); border: 1px solid var(--color-border);
  color: var(--color-text-secondary); cursor: pointer; transition: all .1s;
}
.chip.sel { border-color: var(--color-brand); color: var(--color-brand); background: var(--color-brand-bg); }
.tick-note { font-size: 10px; color: var(--color-text-muted); margin-top: 4px; display: flex; align-items: center; gap: 3px; }

.mkt-strip {
  background: var(--color-surface-inset); border-radius: var(--radius-sm);
  padding: var(--x2) var(--x3); display: flex; gap: var(--x3); margin-bottom: var(--x3);
}
.mkt-i { flex: 1; text-align: center; }
.mkt-l { font-size: 9px; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.mkt-v { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }

.tlo-bar {
  background: var(--color-brand-bg);
  border: 1px solid color-mix(in srgb, var(--color-brand) 22%, transparent);
  border-radius: var(--radius-sm); padding: var(--x3);
  display: flex; gap: var(--x2); align-items: flex-start; margin-bottom: var(--x3);
}
.tlo-bar-icon { font-size: 15px; flex-shrink: 0; }
.tlo-bar-text { font-size: 11px; color: var(--color-brand); line-height: 1.5; }
.tlo-bar-text b { font-weight: 700; display: block; }

.val-banner {
  border-radius: var(--radius-sm); padding: var(--x2) var(--x3);
  display: flex; gap: var(--x2); align-items: flex-start;
  font-size: 11px; line-height: 1.5; margin-bottom: var(--x3);
}
.val-banner b { font-weight: 700; display: block; }
.val-banner.ok { background: var(--color-brand-bg); border: 1px solid color-mix(in srgb,var(--color-brand) 22%,transparent); color: var(--color-brand); }
.val-banner.err { background: var(--color-negative-bg); border: 1px solid color-mix(in srgb,var(--color-negative) 22%,transparent); color: var(--color-negative); }
.val-banner.info { background: var(--color-blue-bg); border: 1px solid color-mix(in srgb,var(--color-blue) 22%,transparent); color: var(--color-blue); }
.val-icon { flex-shrink: 0; font-size: 13px; }

.summary {
  background: var(--color-surface-inset); border-radius: var(--radius-sm);
  border: 1px solid var(--color-border); overflow: hidden; margin-bottom: var(--x4);
}
.s-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--x2) var(--x3); border-bottom: 1px solid var(--color-border);
}
.s-row:last-child { border-bottom: none; }
.s-k { font-size: 11px; color: var(--color-text-secondary); }
.s-v { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.s-v.tlo { color: var(--color-brand); }

.cta-row {
  display: flex; gap: var(--x2); padding: var(--x3) var(--x4);
  background: var(--color-surface); border-top: 1px solid var(--color-border);
}
.btn-buy { flex: 1; height: 46px; border-radius: var(--radius-md); font-size: 14px; font-weight: 700; background: var(--color-brand); color: #fff; cursor: pointer; transition: background .15s; }
.btn-buy:hover { background: var(--color-brand-hover); }
.btn-sell { flex: 1; height: 46px; border-radius: var(--radius-md); font-size: 14px; font-weight: 700; background: var(--color-negative); color: #fff; cursor: pointer; }
.btn-disabled { opacity: .4; cursor: not-allowed !important; }

/* LIMIT badge */
.tlo-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: var(--radius-full);
  font-size: 9px; font-weight: 700; letter-spacing: .4px;
  background: var(--color-brand-bg); color: var(--color-brand);
  border: 1px solid color-mix(in srgb, var(--color-brand) 25%, transparent);
}
.tlo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--color-brand); }

/* Status chips */
.status-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: var(--radius-full);
  font-size: 9px; font-weight: 700; letter-spacing: .3px;
}
.chip-pending { background: var(--color-warning-bg); color: var(--color-warning); }
.chip-partial { background: var(--color-blue-bg); color: var(--color-blue); }
.chip-filled { background: var(--color-brand-bg); color: var(--color-brand); }
.chip-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
.chip-pending .chip-dot { animation: pulse-dot 1.8s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:.3} }

/* Portfolio */
.port-header { background: var(--color-surface); padding: var(--x4); border-bottom: 1px solid var(--color-border); }
.port-title { font-size: 16px; font-weight: 700; }
.port-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.port-stats { display: flex; gap: var(--x4); margin-top: var(--x3); }
.ps-k { font-size: 9px; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.ps-v { font-size: 14px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
.ps-v.pos { color: var(--color-brand); }

.filter-bar {
  padding: var(--x2) var(--x4); display: flex; gap: var(--x2);
  background: var(--color-surface); border-bottom: 1px solid var(--color-border);
  overflow-x: auto; scrollbar-width: none;
}
.f-chip {
  padding: 4px 10px; border-radius: var(--radius-full); font-size: 11px; font-weight: 500;
  flex-shrink: 0; background: var(--color-surface-inset); border: 1px solid var(--color-border);
  color: var(--color-text-secondary); cursor: pointer;
}
.f-chip.on { background: var(--color-blue-bg); border-color: var(--color-blue); color: var(--color-blue); font-weight: 600; }

.pos-list {
  padding: var(--x2) var(--x4) calc(var(--x4) + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; gap: var(--x2); background: var(--color-bg);
}
.pos-card {
  background: var(--color-surface); border-radius: var(--radius-md);
  border: 1px solid var(--color-border); overflow: hidden; box-shadow: var(--shadow-1); cursor: pointer;
  transition: box-shadow .15s;
}
[hidden] { display: none !important; }
.pos-card:hover { box-shadow: var(--shadow-2); }
.pos-head { padding: var(--x3) var(--x3) var(--x2); display: flex; align-items: flex-start; gap: var(--x3); }
.pos-logo {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; margin-top: 1px;
}
.pos-logo.aapl { background: linear-gradient(135deg,#555,#222); }
.pos-logo.tsla { background: linear-gradient(135deg,#CC0000,#e31010); }
.pos-logo.nvda { background: linear-gradient(135deg,#76b900,#529900); }
.pos-name { font-size: 13px; font-weight: 700; }
.pos-meta { font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.pos-price-col { margin-left: auto; text-align: right; }
.pos-price { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.pos-pl { font-size: 11px; font-weight: 600; }

.fill-sec { padding: 0 var(--x3) var(--x3); }
.fill-head { display: flex; justify-content: space-between; margin-bottom: var(--x2); }
.fill-label { font-size: 10px; color: var(--color-text-secondary); }
.fill-count { font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; }
.fill-count .fn { color: var(--color-brand); }
.fill-track { height: 5px; border-radius: var(--radius-full); background: var(--color-surface-inset); overflow: hidden; }
.fill-fill { height: 100%; border-radius: var(--radius-full); background: var(--color-brand); transition: width .4s; }
.fill-fill.partial { background: var(--color-blue); }
.fill-fill.zero { background: var(--color-warning); width: 4px; }

.card-actions { padding: var(--x2) var(--x3); display: flex; gap: var(--x2); border-top: 1px solid var(--color-border); }
.act-cancel {
  flex: 1; padding: 7px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700;
  cursor: pointer; background: var(--color-negative-bg); color: var(--color-negative);
  border: 1px solid color-mix(in srgb, var(--color-negative) 22%, transparent);
  transition: all .15s;
}
.act-cancel:hover { background: var(--color-negative); color: #fff; }
.act-detail {
  flex: 1; padding: 7px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700;
  cursor: pointer; background: var(--color-surface-inset); color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
}

/* Bottom sheet */
.sheet-wrap {
  position: relative; min-height: 680px;
}
.sheet-bg { position: absolute; inset: 0; background: rgba(0,0,0,.38); backdrop-filter: blur(2px); z-index: 10; }
.sheet-bg-content { position: relative; z-index: 1; }
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--color-surface); border-radius: 20px 20px 0 0;
  padding: var(--x5) var(--x4) var(--x6); border-top: 1px solid var(--color-border);
}
.sheet-handle { width: 36px; height: 4px; border-radius: var(--radius-full); background: var(--color-border-strong); margin: 0 auto var(--x4); }
.sheet-title { font-size: 16px; font-weight: 700; margin-bottom: var(--x2); }
.sheet-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin-bottom: var(--x4); }
.sheet-card { background: var(--color-surface-inset); border-radius: var(--radius-sm); padding: var(--x3); margin-bottom: var(--x4); border: 1px solid var(--color-border); }
.sheet-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: var(--x1); }
.sheet-row:last-child { margin: 0; }
.sr-k { color: var(--color-text-secondary); }
.sr-v { font-weight: 700; font-variant-numeric: tabular-nums; }
.sheet-warn { background: var(--color-warning-bg); border: 1px solid color-mix(in srgb, var(--color-warning) 22%, transparent); border-radius: var(--radius-sm); padding: var(--x2) var(--x3); font-size: 10px; color: var(--color-warning); line-height: 1.5; display: flex; gap: var(--x2); margin-bottom: var(--x4); }
.sheet-btns { display: flex; gap: var(--x2); }
.s-btn { flex: 1; height: 44px; border-radius: var(--radius-md); font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: background .15s; }
.s-btn.confirm { background: var(--color-negative); color: #fff; }
.s-btn.keep { background: var(--color-surface-inset); color: var(--color-text-primary); border: 1.5px solid var(--color-border); }

/* Confirmation screen */
.confirm-screen {
  background: var(--color-surface); min-height: auto;
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: var(--x8) var(--x6) calc(var(--x8) + env(safe-area-inset-bottom));
}
.confirm-icon { font-size: 52px; margin-bottom: var(--x5); }
.confirm-title { font-size: 20px; font-weight: 800; margin-bottom: var(--x2); text-align: center; }
.confirm-sub { font-size: 13px; color: var(--color-text-secondary); text-align: center; line-height: 1.6; margin-bottom: var(--x6); }
.confirm-card {
  background: var(--color-surface-inset); border-radius: var(--radius-md);
  border: 1px solid var(--color-border); padding: var(--x4); width: 100%;
  margin-bottom: var(--x6);
}
.confirm-row { display: flex; justify-content: space-between; padding: var(--x2) 0; border-bottom: 1px solid var(--color-border); }
.confirm-row:last-child { border: none; }
.ck { font-size: 12px; color: var(--color-text-secondary); }
.cv { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
.btn-port {
  width: 100%; height: 46px; border-radius: var(--radius-md); font-size: 14px; font-weight: 700;
  background: var(--color-brand); color: #fff; cursor: pointer;
}

/* Detail screen */
.detail-fill-box {
  background: var(--color-surface-inset); border-radius: var(--radius-md);
  padding: var(--x4); text-align: center; border: 1px solid var(--color-border);
  margin: 0 var(--x4) var(--x3);
}
.big-fill { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; }
.big-fill .fn { color: var(--color-blue); }
.big-fill .sep { font-size: 16px; color: var(--color-text-muted); margin: 0 4px; }
.fill-label-sm { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; }
.fill-bar-big { height: 8px; border-radius: var(--radius-full); background: var(--color-surface-inset) !important; overflow: hidden; margin-top: var(--x3); }
.fill-pct-row { display: flex; justify-content: space-between; margin-top: 4px; font-size: 9px; color: var(--color-text-muted); }

/* ============================================================
   CLICK TARGETS (invisible overlay triggers)
   ============================================================ */
.tap-zone {
  cursor: pointer; position: relative;
  transition: opacity .15s;
}
.tap-zone:hover { opacity: .85; }
.tap-zone::after {
  content: '';
  position: absolute; inset: -2px;
  border-radius: inherit;
}

/* Tap hint animation */
.tap-hint {
  position: absolute; bottom: var(--x3); left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.6); color: #fff; border-radius: var(--radius-full);
  padding: 5px 12px; font-size: 11px; font-weight: 600; white-space: nowrap;
  pointer-events: none; z-index: 50;
  animation: fadeUpHint 2.5s ease-in-out infinite;
}
@keyframes fadeUpHint {
  0%,100% { opacity: 0; transform: translateX(-50%) translateY(4px); }
  25%,75% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@media (max-width: 780px) {
  .annotation-panel { display: none; }
  .proto-stage { padding: var(--x4) var(--x3); }
  .card-actions, .cta-row, .sheet-btns { flex-direction: column; }
  .card-actions > *, .cta-row > *, .sheet-btns > * { width: 100%; }
}

.switch-btn {
  display: flex; align-items: center; justify-content: center; gap: var(--x2);
  width: 100%; padding: 10px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 600;
  background: var(--color-brand-bg); color: var(--color-brand);
  border: 1px solid color-mix(in srgb, var(--color-brand) 25%, transparent);
  cursor: pointer; transition: background .15s; margin-top: var(--x2);
}
.switch-btn:hover { background: var(--color-brand); color: #fff; }

.btn-buy.btn-form-invalid {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ─── eToro native execution CSS (from approved preview) ─── */

@font-face {
  font-family: 'eToroNum';
  src: url('https://marketing.etorostatic.com/cache1/fonts/etoro/eToro-VF-v0.7.ttf') format('truetype');
  font-weight: 100 900;
  font-display: swap;
}
* { margin:0;padding:0;box-sizing:border-box; }
html,body { background:#080810;min-height:100vh;-webkit-font-smoothing:antialiased; }
button { font-family:inherit;border:none;cursor:pointer;background:none;color:inherit; }

:root {
  --bg:   #080810;
  --sht:  #1C1C1E;
  --pill: rgba(255,255,255,.1);
  --t1:   #ffffff;
  --t2:   rgba(255,255,255,.5);
  --t3:   rgba(255,255,255,.28);
  --grn:  #0EB12E;
  --ok:   #0EB12E;
  --err:  #FF3B30;
  --bdr:  rgba(255,255,255,.1);
}

/* Shell */
.shell {
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;gap:12px;
}
.nav-row {
  display:flex;align-items:center;gap:10px;
}
.nav-a {
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);color:#fff;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.nav-a:disabled{opacity:.25;cursor:default;}
.nav-dots {
  display:flex;gap:6px;align-items:center;
}
.nav-dot {
  width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);
  transition:all .15s;
}
.nav-dot.on { width:16px;border-radius:3px;background:var(--grn); }

/* Phone — exact iPhone 14 proportions at 1x: 390×844 */
.phone {
  width:390px;
  height:844px;
  border-radius:48px;
  border:2px solid #3A3A3C;
  overflow:hidden;
  position:relative;
  background:var(--bg);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06) inset,
    0 0 0 1px rgba(255,255,255,.05),
    0 32px 80px rgba(0,0,0,.7),
    0 2px 0 rgba(255,255,255,.1) inset;
}

/* Status bar: 54px */
.sb {
  position:absolute;top:0;left:0;right:0;height:54px;
  background:var(--bg);z-index:20;
  display:flex;align-items:flex-end;
  justify-content:space-between;
  padding:0 28px 10px;
}
.sb-time{font-size:15px;font-weight:700;color:var(--t1);font-family:'Inter',sans-serif;}
.sb-icons{display:flex;gap:5px;align-items:center;}
.sb-icon{font-size:12px;color:var(--t1);}

/* Screens */
.scr {
  position:absolute;top:54px;left:0;right:0;bottom:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.scr.off{display:none;}

/* ── Top bar ── */
.top-bar {
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 4px;
}
.back-btn {
  width:36px;height:36px;border-radius:50%;
  background:var(--pill);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:200;color:var(--t1);
  line-height:1;
}
.ot-pill {
  display:flex;align-items:center;gap:4px;
  padding:8px 14px;border-radius:28px;background:var(--pill);
  font-size:14px;font-weight:600;color:var(--t1);
}
.ot-pill .ch{font-size:9px;opacity:.55;margin-left:2px;}
.order-picker-overlay{
  position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,.42);
  backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;
}
.order-picker-sheet{
  width:100%;background:var(--color-surface);
  border-top:1px solid var(--color-border);
  border-radius:20px 20px 0 0;
  padding:var(--x4) var(--x4) calc(var(--x6) + env(safe-area-inset-bottom,0px));
  box-shadow:0 -12px 40px rgba(0,0,0,.42);
}
.order-picker-head{
  width:36px;height:4px;border-radius:999px;
  background:var(--color-border-strong);
  margin:0 auto var(--x4);
}
.order-picker-title{
  font-size:16px;font-weight:700;color:var(--t1);text-align:center;
}
.order-picker-sub{
  margin-top:4px;margin-bottom:var(--x4);
  font-size:12px;line-height:1.45;color:var(--t2);text-align:center;
}
.order-picker-list{display:flex;flex-direction:column;gap:8px;}
.order-picker-item{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 14px;border-radius:16px;background:var(--color-surface-inset);
  border:1px solid var(--color-border);text-align:left;
}
.order-picker-item.active{
  border-color:color-mix(in srgb, var(--color-brand) 34%, transparent);
  background:color-mix(in srgb, var(--color-brand) 10%, var(--color-surface-inset));
}
.order-picker-main{display:flex;align-items:center;gap:10px;}
.order-picker-name{font-size:14px;font-weight:700;color:var(--t1);}
.order-picker-meta{font-size:11px;color:var(--t2);margin-top:2px;}
.order-picker-check{font-size:14px;font-weight:800;color:var(--ok);}
.order-picker-badge{
  font-size:9px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 7px;border-radius:999px;
}
.order-picker-badge.new{background:var(--color-brand);color:#fff;}
.order-picker-badge.renamed{background:rgba(255,184,0,.18);color:#FFD166;border:1px solid rgba(255,184,0,.35);}
.order-picker-cancel{
  width:100%;height:48px;margin-top:12px;border-radius:14px;
  background:rgba(255,255,255,.06);color:var(--t1);font-size:14px;font-weight:700;
}
.order-dd{position:relative;}
.order-dd-menu{
  position:absolute;top:calc(100% + 8px);right:0;z-index:30;
  min-width:190px;padding:8px;
  border-radius:16px;
  background:#1C1C1E;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 16px 40px rgba(0,0,0,.45);
}
.order-dd-menu[hidden]{display:none !important;}
.order-dd-item{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:11px 12px;border-radius:12px;
  color:var(--t1);font-size:14px;font-weight:600;text-align:left;
  background:transparent;
}
.order-dd-item + .order-dd-item{margin-top:4px;}
.order-dd-item:hover{background:rgba(255,255,255,.06);}
.order-dd-item.on{
  background:rgba(14,177,46,.14);
  color:#fff;
}
.order-dd-item .dd-meta{
  font-size:11px;font-weight:500;color:var(--t2);
}
.order-dd-item .dd-check{
  color:var(--ok);font-size:12px;font-weight:800;
}
.ot-pill.limit-active{
  background:rgba(14,177,46,.18);
  border:1px solid rgba(14,177,46,.45);
}

/* ── Asset strip ── */
.asset-strip {
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:0 20px 6px;
}
.asset-ico {
  width:20px;height:20px;border-radius:5px;
  background:#18182A;border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:6px;font-weight:800;color:#fff;letter-spacing:-.5px;
}
.a-tick{font-size:14px;font-weight:600;color:var(--t1);}
.a-sep{color:var(--t3);font-size:12px;}
.a-price{font-size:14px;font-weight:400;color:var(--t2);font-variant-numeric:tabular-nums;}

/* ── Amount ── */
.amount-area {
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  padding:12px 20px 0;
}
.amount-row{display:flex;align-items:flex-start;gap:1px;margin-bottom:8px;}
.amt-sym{
  font-size:24px;font-weight:500;color:var(--t1);
  padding-top:12px;font-family:'Roboto',sans-serif;
}
.amt-num{
  font-size:60px;font-weight:400;color:var(--t1);
  font-variant-numeric:tabular-nums;
  font-feature-settings:'ss06' 1,'lnum' 1,'tnum' 1;
  letter-spacing:0;line-height:72px;
  font-family:'eToroNum','Inter',sans-serif;
}
.qty-pill{
  display:flex;align-items:center;gap:5px;
  padding:7px 16px;border-radius:28px;background:var(--pill);
  font-size:13px;font-weight:500;color:var(--t1);
  margin-bottom:6px;
}
.qty-pill .rf{opacity:.5;font-size:12px;}
.avail{font-size:13px;color:var(--t2);}

/* ── Keypad — 4 rows × 62px = 248px ── */
.keypad{
  flex-shrink:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:var(--bg);
  padding:0 2px;
}
.k{
  height:62px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:400;color:var(--t1);
  border-radius:8px;transition:background .07s;
}
.k:active{background:rgba(255,255,255,.1);}
.k-dot{font-size:30px;font-weight:700;padding-bottom:6px;}
.k-del svg{opacity:.8;}

/* ── CTA ── */
.cta-area{
  flex-shrink:0;
  padding:8px 20px 16px;
  background:var(--bg);
}
.cta-buy{
  width:100%;height:54px;border-radius:28px;
  background:var(--grn);color:#fff;
  font-size:16px;font-weight:600;font-family:'eToroNum','Inter',sans-serif;
  transition:background .12s;
}
.cta-buy:hover{background:#0C9A27;}
.cta-buy:disabled{background:rgba(255,255,255,.11);color:rgba(255,255,255,.33);}

/* ══ Screen 2: Set Limit sheet ══ */
.scr-2-bg{
  flex:1;min-height:0;display:flex;flex-direction:column;position:relative;
}
.dim-layer{
  position:absolute;inset:0;background:rgba(0,0,0,.52);z-index:1;
}
.s2-behind{
  flex:1;display:flex;flex-direction:column;
  opacity:.42;pointer-events:none;
}

/* Sheet */
.lmt-sheet{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  background:var(--sht);
  border-radius:16px 16px 0 0;
  display:flex;flex-direction:column;
  /* shadow to give depth */
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
}
.sht-handle{
  width:40px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.22);
  margin:12px auto 20px;flex-shrink:0;
}
.sht-title{
  font-size:18px;font-weight:700;color:var(--t1);
  text-align:center;margin-bottom:4px;flex-shrink:0;
  font-family:'eToroNum','Inter',sans-serif;
}
.sht-sub{
  font-size:13px;color:var(--t2);
  text-align:center;margin-bottom:16px;flex-shrink:0;
}
.sht-num{
  font-size:58px;font-weight:400;color:var(--t1);
  text-align:center;
  font-variant-numeric:tabular-nums;
  font-feature-settings:'ss06' 1,'lnum' 1,'tnum' 1;
  letter-spacing:0;line-height:66px;
  font-family:'eToroNum','Inter',sans-serif;
  min-height:68px;padding:0 20px;
  margin-bottom:4px;
  flex-shrink:0;
}
.sht-val{
  font-size:11px;color:var(--ok);
  text-align:center;min-height:14px;
  margin-bottom:6px;flex-shrink:0;
}
.sht-val.err{color:var(--err);}
.sht-kp{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:var(--sht);flex-shrink:0;padding:0 2px;
}
.sht-kp .k{height:60px;font-size:24px;}
.sht-kp .k:active{background:rgba(255,255,255,.07);}
.sht-cta{padding:10px 20px 24px;flex-shrink:0;}
.sht-set-btn{
  width:100%;height:54px;border-radius:28px;
  background:var(--grn);color:#fff;
  font-size:16px;font-weight:600;font-family:'eToroNum','Inter',sans-serif;
}
.sht-set-btn:hover{background:#0C9A27;}
.sht-set-btn:disabled{background:rgba(255,255,255,.11);color:rgba(255,255,255,.33);}


/* ─── Titanium phone frame (ProductClaw spec — no-layout approach) ─── */
.phone-frame, .phone {
  border: none !important;
  border-radius: 38px !important;
  /* Use outline for the metallic ring — doesn't affect layout */
  outline: 5px solid transparent !important;
  outline-offset: 0 !important;
  /* Multi-layer box-shadow creates the titanium gradient ring */
  box-shadow:
    0 0 0 2px #6F757D,
    0 0 0 4px #434850,
    0 0 0 5px #2A2F35,
    inset 0 1px 0 rgba(255,255,255,.18),
    0 0 0 6px rgba(255,255,255,.06),
    0 24px 60px rgba(0,0,0,.75) !important;
}
/* Notch same material */
.phone-notch {
  background: linear-gradient(180deg, #5A6068 0%, #3A3F47 100%) !important;
  border-radius: 0 0 14px 14px !important;
}
/* Status bar matches frame base */
.phone-status {
  background: #1A1E24 !important;
}

/* ─── Responsive phone frame scaling ─── */
@media (max-height: 960px) {
  .proto-stage {
    align-items: flex-start;
  }
  .phone-wrap {
    transform-origin: top center;
    /* Scale phone to fit viewport height with room for nav/controls */
    transform: scale(var(--phone-scale, 1));
  }

function buildStepNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) => {
    const visited = i < currentStep ? 'visited' : '';
    const active = i === currentStep ? 'active' : '';
    const arrow = i < STEPS.length - 1 ? '<span class="step-arrow" aria-hidden="true">›</span>' : '';
    return `<button class="step-item ${active} ${visited}" onclick="goTo(${i})" aria-label="Go to screen ${i+1}: ${s.label}" aria-current="${i === currentStep ? 'step' : 'false'}">
        <div class="step-num" aria-hidden="true">${i + 1}</div>
        <span class="step-label">${s.label}</span>
      </button>${arrow}`;
  }).join('');
}

function buildDots() {
  const dots = document.getElementById('stepDots');
  dots.innerHTML = STEPS.map((s, i) =>
    `<div class="step-dot ${i === currentStep ? 'active' : ''}" role="presentation" aria-hidden="true"></div>`
  ).join('');
}

function buildAnnotation() {
  const s = STEPS[currentStep];
  const ann = document.getElementById('annotationPanel');
  ann.innerHTML = `
    <div class="ann-card">
      <div class="ann-screen-tag">${s.tag}</div>
      <div class="ann-title">${s.title}</div>
      <div class="ann-desc">${s.desc}</div>
      <ul class="ann-points">
        ${s.points.map(p => `
          <li>
            <div class="ann-dot ${p.type === 'warn' ? 'warn' : p.type === 'blue' ? 'blue' : ''}" aria-hidden="true">✓</div>
            <span>${p.text}</span>
          </li>
        `).join('')}
      </ul>
      <div class="ann-cta">
        <span style="font-size:16px;" aria-hidden="true">👆</span>
        <span>${s.cta}</span>
      </div>
    </div>
  `;
}

function renderScreen(dir) {
  const screen = document.getElementById('phoneScreen');
  const s = STEPS[currentStep];
  const animClass = dir === 'forward' ? 'slide-in-right' : 'slide-in-left';
  screen.innerHTML = s.html();
  const content = screen.querySelector('.screen-content, .sheet-wrap');
  if (content) {
    content.classList.add(animClass);
    setTimeout(() => content.classList.remove(animClass), 300);
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  direction = idx > currentStep ? 'forward' : 'backward';
  currentStep = idx;
  renderScreen(direction);
  buildStepNav();
  buildDots();
  buildAnnotation();
  if (idx === 1) setTimeout(validateForm, 10); // LIMIT entry screen
  document.getElementById('stepCounter').textContent = `${currentStep + 1} / ${STEPS.length}`;
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').disabled = currentStep === STEPS.length - 1;
  const activeItem = document.querySelector('.step-item.active');
  if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  if (idx === 1) {
    kpFresh = false; kpVal = '184.56';  // reset to clean state
    setTimeout(function(){
      var d=document.getElementById('kp-display');
      if(d)d.textContent=kpVal;
      if(typeof validateForm==='function')validateForm();
    }, 50);
  }
  if (idx === 0) {
    mktMode = 'amount';
    mktAmountValue = 10.00;
    mktSharesValue = mktAmountValue / mktPrice;
    mktKpFresh = false;
    mktBufferDirty = false;
    mktKpVal = mktAmountValue.toFixed(2);  // reset market keypad
    setTimeout(function(){
      updateMktDisplay();
    }, 50);
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-btn').textContent = isDark ? '🌙' : '☀️';
}

function selectFChip(btn) {
  if (!btn) return;
  const bar = btn.closest('.filter-bar');
  if (!bar) return;

  bar.querySelectorAll('.f-chip').forEach(c => {
    c.classList.remove('on');
    c.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('on');
  btn.setAttribute('aria-selected', 'true');

  const list = (bar.parentElement && bar.parentElement.querySelector('.pos-list'))
    || (bar.nextElementSibling && bar.nextElementSibling.classList.contains('pos-list') ? bar.nextElementSibling : null);
  if (!list) return;

  const filter = btn.textContent.replace(/\s+/g, ' ').trim().toLowerCase();
  const cards = Array.from(list.querySelectorAll('.pos-card'));

  cards.forEach(card => {
    const dataStatus = (card.dataset.status || '').toLowerCase();
    const statusText = ((card.querySelector('.status-chip') || {}).textContent || '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
    const cardText = card.textContent.replace(/\s+/g, ' ').trim().toLowerCase();

    let show = true;
    if (filter.startsWith('active')) {
      show = dataStatus
        ? (dataStatus.includes('active') || dataStatus.includes('pending'))
        : (statusText.includes('pending') || statusText.includes('partial'));
    } else if (filter.startsWith('filled')) {
      show = dataStatus
        ? (dataStatus.includes('filled') && !dataStatus.includes('cancelled'))
        : (statusText.includes('filled') && !cardText.includes('cancelled'));
    } else if (filter.startsWith('cancelled')) {
      show = dataStatus ? dataStatus.includes('cancelled') : cardText.includes('cancelled');
    }

    card.hidden = !show;
    card.style.display = show ? '' : 'none';
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentStep + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentStep - 1);
});


/* ─── Event delegation ──────────────────────────────────────────── */
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;

  /* Chip selection — toggle active state AND update bound form values */
  if (btn.classList.contains('chip') && !btn.classList.contains('f-chip')) {
    const group = btn.closest('[role="group"]') || btn.parentElement;
    if (group) {
      group.querySelectorAll('.chip').forEach(c => {
        c.classList.remove('sel');
        c.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('sel');
      btn.setAttribute('aria-pressed', 'true');
    }

    /* Amount chips (Screen 1 — Market Order) */
    if (btn.dataset.amount) {
      const amt = parseInt(btn.dataset.amount);
      const mktPrice = 186.42;
      const shares = Math.floor(amt / mktPrice);
      const inp = document.getElementById('mkt-amount-input');
      if (inp) inp.value = amt >= 1000
        ? '$' + (amt/1000).toFixed(0) + ',000.00'
        : '$' + amt.toFixed(0) + '.00';
      const estEl = document.getElementById('mkt-est-shares');
      if (estEl) estEl.textContent = shares < 1 ? '< 1 share ⚠' : '~' + shares + ' shares';
      const totalEl = document.getElementById('mkt-total');
      if (totalEl) totalEl.textContent = shares < 1 ? '—' :
        '$' + (shares * mktPrice + 1.99).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      return;
    }

    /* Price chips (Screen 2 — LIMIT Entry) */
    if (btn.dataset.price) {
      const price = parseFloat(btn.dataset.price);
      const ask = 186.45;
      const pInp = document.getElementById('tlo-price-input');
      if (pInp) pInp.value = price.toFixed(2);
      const sEl = document.getElementById('tlo-summary-price');
      if (sEl) sEl.textContent = '$' + price.toFixed(2);
      // Update reserved (use current shares)
      const sharesInp = document.querySelector('.input-f.shares');
      const shares = sharesInp ? parseInt(sharesInp.value) || 5 : 5;
      const reserved = (price * shares).toFixed(2);
      const resEl = document.getElementById('tlo-summary-reserved');
      if (resEl) resEl.textContent = '$' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2});
      const bText = document.getElementById('tlo-reserve-text');
      if (bText) bText.innerHTML = '<b>Balance reserved at limit price</b> $' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
      return;
    }

    /* Share chips (Screen 2 — LIMIT Entry) */
    if (btn.dataset.shares) {
      const shares = parseInt(btn.dataset.shares);
      const sharesInp = document.querySelector('.input-f.shares');
      if (sharesInp) sharesInp.value = shares;
      const qEl = document.getElementById('tlo-summary-qty');
      if (qEl) qEl.textContent = shares + ' shares';
      const pInp = document.getElementById('tlo-price-input');
      const price = pInp ? parseFloat(pInp.value) || 184.56 : 184.56;
      const reserved = (price * shares).toFixed(2);
      const resEl = document.getElementById('tlo-summary-reserved');
      if (resEl) resEl.textContent = '$' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2});
      const bText3 = document.getElementById('tlo-reserve-text');
      if (bText3) bText3.innerHTML = '<b>Balance reserved at limit price</b> $' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
      return;
    }

    return;
  }

  /* Portfolio filter chips */
  if (btn.classList.contains('f-chip')) {
    selectFChip(btn);
    return;
  }

  /* BUY / SELL direction toggle */
  if ((btn.textContent.trim() === 'BUY' || btn.textContent.trim() === 'SELL')
      && btn.closest('[role="group"]')) {
    const group = btn.closest('[role="group"]');
    group.querySelectorAll('button').forEach(b => {
      b.classList.remove('active', 'buy', 'sell');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
    if (btn.textContent.trim() === 'BUY') btn.classList.add('buy');
    if (btn.textContent.trim() === 'SELL') btn.classList.add('sell');
    return;
  }
});

/* ─── Live input handlers (manual typing) ─────────────────────────── */
document.addEventListener('input', function(e) {
  const inp = e.target;

  /* Manual price entry — Screen 2 LIMIT */
  if (inp.id === 'tlo-price-input') {
    const price = parseFloat(inp.value);
    const ask = 186.45;
    if (isNaN(price)) return;

    // Deselect all price chips
    document.querySelectorAll('[data-price]').forEach(c => {
      c.classList.remove('sel');
      c.setAttribute('aria-pressed', 'false');
    });
    // Select matching chip if exact match
    document.querySelectorAll('[data-price]').forEach(c => {
      if (parseFloat(c.dataset.price) === price) {
        c.classList.add('sel');
        c.setAttribute('aria-pressed', 'true');
      }
    });

    // Update summary price
    const sEl = document.getElementById('tlo-summary-price');
    if (sEl) sEl.textContent = isNaN(price) ? '—' : '$' + price.toFixed(2);

    // Update reserved
    const sharesInp = document.getElementById('tlo-shares-input') || document.querySelector('.input-f.shares');
    const shares = sharesInp ? parseInt(sharesInp.value) || 5 : 5;
    const reserved = price * shares;
    const resEl = document.getElementById('tlo-summary-reserved');
    if (resEl) resEl.textContent = isNaN(reserved) ? '—' : '$' + reserved.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const bText4 = document.getElementById('tlo-reserve-text');
    if (bText4 && !isNaN(reserved)) bText4.innerHTML = '<b>Balance reserved at limit price</b> $' + reserved.toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
    validateForm();

    // Validation banner
    const valBanner = document.getElementById('price-validation');
    if (valBanner) {
      if (price > ask * 1.02) {
        valBanner.className = 'val-banner err';
        valBanner.innerHTML = '<span class="val-icon">⚠</span><div><b>Price exceeds Ask + tolerance</b>$' + price.toFixed(2) + ' is ' + ((price/ask-1)*100).toFixed(2) + '% above Ask ($' + ask + '). Max +2%. Reduce your price.</div>';
      } else if (price <= 0) {
        valBanner.className = 'val-banner err';
        valBanner.innerHTML = '<span class="val-icon">⚠</span><div><b>Invalid price</b>Enter a valid limit price.</div>';
      } else {
        const pctBelow = ((ask - price) / ask * 100).toFixed(2);
        valBanner.className = 'val-banner ok';
        valBanner.innerHTML = '<span class="val-icon">✓</span><div><b>Price valid — below Ask</b>$' + price.toFixed(2) + ' is ' + pctBelow + '% below Ask. Order will rest until price reaches your level.</div>';
      }
    }
    return;
  }

  /* Manual shares entry — Screen 2 LIMIT */
  if (inp.id === 'tlo-shares-input' || (inp.classList.contains('input-f') && inp.classList.contains('shares') && !inp.id)) {
    validateForm();  // always validate first — catches fractional, empty, zero
    const shares = parseInt(inp.value);
    if (isNaN(shares) || shares < 1) return;

    // Deselect all share chips
    document.querySelectorAll('[data-shares]').forEach(c => {
      c.classList.remove('sel');
      c.setAttribute('aria-pressed', 'false');
    });
    document.querySelectorAll('[data-shares]').forEach(c => {
      if (parseInt(c.dataset.shares) === shares) {
        c.classList.add('sel');
        c.setAttribute('aria-pressed', 'true');
      }
    });

    const qEl = document.getElementById('tlo-summary-qty');
    if (qEl) qEl.textContent = shares + ' shares';

    const priceInp = document.getElementById('tlo-price-input');
    const price = priceInp ? parseFloat(priceInp.value) || 184.56 : 184.56;
    const reserved = price * shares;
    const resEl = document.getElementById('tlo-summary-reserved');
    if (resEl) resEl.textContent = '$' + reserved.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const bannerText = document.getElementById('tlo-reserve-text');
    if (bannerText) bannerText.innerHTML = '<b>Balance reserved at limit price</b> $' + reserved.toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
    validateForm();  // re-run after updating to ensure consistent state
    return;
  }

  /* Manual amount entry — Screen 1 */
  if (inp.id === 'mkt-amount-input') {
    const raw = inp.value.replace(/[^0-9.]/g, '');
    const amt = parseFloat(raw);
    if (isNaN(amt)) return;
    const mktPrice = 186.42;
    const shares = Math.floor(amt / mktPrice);
    const estEl = document.getElementById('mkt-est-shares');
    if (estEl) estEl.textContent = shares < 1 ? '< 1 share ⚠' : '~' + shares + ' shares';
    const totalEl = document.getElementById('mkt-total');
    if (totalEl) totalEl.textContent = shares < 1 ? '—' : '$' + (shares * mktPrice + 1.99).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    return;
  }
});

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 16px;border-radius:99px;font-size:12px;font-weight:600;z-index:9999;pointer-events:none;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

/* ─── Order state — shared between LIMIT entry and Confirmation ─── */
let orderState = { price: 184.56, shares: 5 };

function validateAndSubmit() {
  const sbtn = document.getElementById('place-limit-btn');
  if (sbtn && sbtn.disabled) return;
  const priceEl = document.getElementById('tlo-price-input');
  const sharesEl = document.getElementById('tlo-shares-input');

  const priceRaw = priceEl ? priceEl.value.replace(/[^0-9.]/g, '') : '184.56';
  const sharesRaw = sharesEl ? sharesEl.value.replace(/[^0-9.]/g, '') : '5';
  const price = parseFloat(priceRaw);
  const sharesFloat = parseFloat(sharesRaw);
  const shares = Math.floor(sharesFloat);
  const ask = 186.45;

  // Validate price
  if (isNaN(price) || price <= 0) {
    return showToast('Enter a valid limit price');
  }
  if (price > ask * 1.02) {
    return showToast('Price too high — exceeds Ask + 2% tolerance. Reduce your price.');
  }

  // Validate shares — whole numbers only
  if (isNaN(sharesFloat) || sharesFloat < 1) {
    return showToast('Enter at least 1 whole share');
  }
  if (sharesFloat !== shares) {
    // Fractional entered — block and show error
    if (sharesEl) {
      sharesEl.value = shares || 1;
      sharesEl.style.borderColor = 'var(--color-negative)';
      setTimeout(() => { sharesEl.style.borderColor = ''; }, 1500);
    }
    return showToast('Whole shares only — ' + sharesFloat + ' rounded down to ' + shares + '. Update before placing.');
  }

  // All valid — store state and navigate to confirmation
  orderState = { price, shares, reserved: (price * shares).toFixed(2) };
  const submitBtn = document.getElementById('place-limit-btn');
  if (submitBtn) { submitBtn.style.background = ''; submitBtn.style.opacity = ''; }
  goTo(3);
}

function validateForm() {
  const priceEl = document.getElementById('tlo-price-input');
  const sharesEl = document.getElementById('tlo-shares-input');
  const btn = document.getElementById('place-limit-btn');
  if (!priceEl || !sharesEl || !btn) return;

  const price = parseFloat(priceEl.value);
  const sharesRaw = sharesEl ? sharesEl.value : '5';
  const sharesFloat = parseFloat(sharesRaw);
  const shares = Math.floor(sharesFloat);
  const ask = 186.45;

  let isValid = true, priceErr = '', sharesErr = '';

  if (isNaN(price) || price <= 0) { priceErr = 'Enter a valid price'; isValid = false; }
  else if (price > ask * 1.02) { priceErr = 'Price ' + price.toFixed(2) + ' exceeds Ask+2% (' + (ask*1.02).toFixed(2) + ')'; isValid = false; }

  if (isNaN(sharesFloat) || sharesFloat < 1) { sharesErr = 'Minimum 1 whole share'; isValid = false; }
  else if (!/^\d+$/.test(sharesRaw.trim()) || sharesFloat !== shares) { sharesErr = 'Whole shares only — ' + sharesRaw + ' is not a whole number'; isValid = false; }

  // Inline error elements — create if missing
  function ensureErr(id, afterEl) {
    let el = document.getElementById(id);
    if (!el && afterEl) {
      el = document.createElement('div');
      el.id = id;
      el.style.cssText = 'font-size:11px;color:var(--color-negative);margin-top:4px;font-weight:600;min-height:14px;';
      afterEl.parentNode.insertBefore(el, afterEl.nextSibling);
    }
    return el;
  }
  const pErrEl = ensureErr('price-inline-err', priceEl.parentElement);
  const sErrEl = ensureErr('shares-inline-err', sharesEl ? sharesEl.parentElement : null);
  if (pErrEl) pErrEl.textContent = priceErr;
  if (sErrEl) sErrEl.textContent = sharesErr;

  // Borders
  priceEl.style.borderColor = priceErr ? 'var(--color-negative)' : '';
  if (sharesEl) sharesEl.style.borderColor = sharesErr ? 'var(--color-negative)' : '';

  // Update the main validation banner to reflect ALL errors
  const mainBanner = document.getElementById('price-validation');
  if (mainBanner) {
    if (!isValid) {
      // Show most relevant error in the main banner
      const mainErr = priceErr || sharesErr;
      mainBanner.className = 'val-banner err';
      mainBanner.innerHTML = '<span class="val-icon">⚠</span><div><b>' +
        (sharesErr ? 'Whole shares only' : 'Invalid price') +
        '</b>' + mainErr + '</div>';
    } else {
      // Restore green ok state
      const price = parseFloat(priceEl.value);
      const ask = 186.45;
      const pctBelow = ((ask - price) / ask * 100).toFixed(2);
      mainBanner.className = 'val-banner ok';
      mainBanner.innerHTML = '<span class="val-icon">✓</span><div><b>Price valid — below Ask</b>$' +
        price.toFixed(2) + ' is ' + pctBelow + '% below Ask. Order rests until price hits your level.</div>';
    }
  }

  // Button — change background color for unmistakable disabled state
  if (isValid) {
    btn.disabled = false;
    btn.removeAttribute('aria-disabled');
    btn.style.background = '';
    btn.style.opacity = '';
    btn.style.cursor = '';
  } else {
    btn.disabled = true;
    btn.setAttribute('aria-disabled', 'true');
    btn.style.background = 'var(--color-border-strong)';
    btn.style.opacity = '0.7';
    btn.style.cursor = 'not-allowed';
  }
}

/* ─── Market order keypad (Screen 1) — first press clears prefill ─── */
var mktPrice = 186.42;
var mktAvailAmount = 12440.00;
var mktMode = 'amount';
var mktAmountValue = 10.00;
var mktSharesValue = mktAmountValue / mktPrice;
var mktKpVal = '10.00';
var mktKpFresh = false;  // true once user has started typing
var mktBufferDirty = false;

function syncMktBufferToState() {
  var n = parseFloat(mktKpVal);
  if (isNaN(n)) return;
  if (mktMode === 'amount') {
    mktAmountValue = n;
    mktSharesValue = n / mktPrice;
  } else {
    mktSharesValue = n;
    mktAmountValue = n * mktPrice;
  }
  mktBufferDirty = false;
}

function updateMktDisplay() {
  var numEl = document.getElementById('mkt-num');
  var symEl = document.querySelector('.amt-sym');
  var pillEl = document.getElementById('mkt-shares');
  var availEl = document.getElementById('mkt-avail');
  var amountEl = document.getElementById('mkt-amount-input');
  var sharesEl = document.getElementById('mkt-est-shares');
  var priceEl = document.getElementById('mkt-est-price');
  var totalEl = document.getElementById('mkt-total');

  if (numEl) numEl.textContent = mktKpVal || '0';
  if (symEl) {
    symEl.textContent = '$';
    symEl.style.opacity = mktMode === 'amount' ? '1' : '0';
  }
  if (pillEl) {
    pillEl.textContent = mktMode === 'amount'
      ? ('~' + mktSharesValue.toFixed(2) + ' shares')
      : ('~$' + mktAmountValue.toFixed(2));
  }
  if (availEl) {
    availEl.textContent = mktMode === 'amount'
      ? ('Available: $' + mktAvailAmount.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}))
      : ('Available: ~' + (mktAvailAmount / mktPrice).toFixed(2) + ' shares');
  }
  if (amountEl) amountEl.textContent = mktAmountValue.toFixed(2);
  if (sharesEl) sharesEl.textContent = '~' + mktSharesValue.toFixed(2) + ' shares';
  if (priceEl) priceEl.textContent = '~$' + mktAmountValue.toFixed(2);
  if (totalEl) totalEl.textContent = '$' + (mktAmountValue + 1.99).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function toggleMktMode() {
  if (mktBufferDirty) syncMktBufferToState();
  if (mktMode === 'amount') {
    mktMode = 'shares';
    mktKpVal = mktSharesValue.toFixed(2);
  } else {
    mktMode = 'amount';
    mktKpVal = mktAmountValue.toFixed(2);
  }
  mktKpFresh = true;
  updateMktDisplay();
}

function mKp(k) {
  if (!mktKpFresh) { mktKpVal = ''; mktKpFresh = true; }
  if (k === '.' && mktKpVal.includes('.')) return;
  if (mktKpVal.includes('.') && mktKpVal.split('.')[1] && mktKpVal.split('.')[1].length >= 2) return;
  if (mktKpVal === '' || (mktKpVal === '0' && k !== '.')) mktKpVal = k; else mktKpVal += k;
  mktBufferDirty = true;
  syncMktBufferToState();
  updateMktDisplay();
}
function mKpDel() {
  mktKpFresh = true;
  if (!mktKpVal || mktKpVal.length <= 1) mktKpVal = '0'; else mktKpVal = mktKpVal.slice(0,-1);
  mktBufferDirty = true;
  syncMktBufferToState();
  updateMktDisplay();
}

/* ─── LIMIT price keypad (Screen 2) ─── */
var kpVal = '184.56';
var kpFresh = false;
function kpPress(k) {
  var d = document.getElementById('kp-display');
  if (!d) return;
  if (!kpFresh) { kpVal = ''; kpFresh = true; }
  if (k === '.' && kpVal.includes('.')) return;
  if (kpVal.includes('.') && kpVal.split('.')[1] && kpVal.split('.')[1].length >= 2) return;
  if (kpVal === '' || (kpVal === '0' && k !== '.')) kpVal = k; else kpVal += k;
  d.textContent = kpVal || '0';
  var inp = document.getElementById('tlo-price-input');
  if (inp) { inp.value = kpVal; inp.dispatchEvent(new Event('input', {bubbles:true})); }
}
function kpBackspace() {
  var d = document.getElementById('kp-display');
  if (!d) return;
  kpFresh = true;
  if (!kpVal || kpVal.length <= 1) kpVal = '0'; else kpVal = kpVal.slice(0,-1);
  d.textContent = kpVal;
  var inp = document.getElementById('tlo-price-input');
  if (inp) { inp.value = kpVal; inp.dispatchEvent(new Event('input', {bubbles:true})); }
}

/* ─── Viewport-fit phone scaling ─── */
function scalePhone() {
  var vph = window.innerHeight;
  var targetH = 844; /* phone frame height */
  var navH = 120;    /* header + nav + controls */
  var available = vph - navH;
  if (available < targetH) {
    var scale = available / targetH;
    document.querySelectorAll('.phone-wrap').forEach(function(el) {
      el.style.setProperty('--phone-scale', scale.toFixed(3));
      el.style.transformOrigin = 'top center';
      el.style.transform = 'scale(' + scale.toFixed(3) + ')';
      el.style.marginBottom = ((targetH * scale) - targetH) + 'px';
    });
  } else {
    document.querySelectorAll('.phone-wrap').forEach(function(el) {
      el.style.transform = '';
      el.style.marginBottom = '';
    });
  }
}
window.addEventListener('resize', scalePhone);

scalePhone();
/* ─── BUY/SELL direction toggle (explicit handler) ─── */
function toggleDir(btn) {
  var group = btn.closest('[role="group"]') || btn.parentElement;
  if (!group) return;
  group.querySelectorAll('button').forEach(function(b) {
    b.classList.remove('active', 'buy', 'sell', 'f-buy', 'f-sell');
    b.setAttribute('aria-pressed', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-pressed', 'true');
  if (btn.textContent.trim() === 'BUY') { btn.classList.add('buy'); btn.classList.add('f-buy'); }
  if (btn.textContent.trim() === 'SELL') { btn.classList.add('sell'); btn.classList.add('f-sell'); }
}

// Init
goTo(0);
</script>
