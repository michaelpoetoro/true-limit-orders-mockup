<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eToro — True Limit Orders · Interactive Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   eToro Plus — True Limit Orders · Execution-native Design
   Dense / Sharp / Operational
   ============================================================ */
:root {
  --bg:          #F2F3F5;
  --surface:     #FFFFFF;
  --surface-sub: #F7F8F9;
  --border:      #E2E5EB;
  --border-mid:  #C8CDD8;
  --text-1:      #0F1117;
  --text-2:      #596174;
  --text-3:      #9199AC;
  --brand:       #0EB12E;
  --brand-dim:   #0A9827;
  --brand-bg:    #EBF9EE;
  --neg:         #E53535;
  --neg-dim:     #CC2E2E;
  --neg-bg:      #FCEAEA;
  --warn:        #D97706;
  --warn-bg:     #FEF3D4;
  --blue:        #2563EB;
  --blue-bg:     #EFF4FF;
  --muted:       #8D95A6;

  /* radius — sharp product style */
  --r2:   2px;
  --r4:   4px;
  --r6:   6px;
  --r8:   8px;
  --rfull: 9999px;

  /* spacing — tight density */
  --s2:  2px;  --s4:  4px;  --s6:  6px;  --s8:  8px;
  --s10: 10px; --s12: 12px; --s14: 14px; --s16: 16px;
  --s20: 20px; --s24: 24px;

  /* typography */
  --t-price: 20px;
  --t-h1:    16px;
  --t-body:  14px;
  --t-sm:    12px;
  --t-xs:    11px;
  --t-label: 11px;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'Inter', -apple-system, monospace;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08);
}

[data-theme="dark"] {
  --bg:        #0B0D11;
  --surface:   #141720;
  --surface-sub:#1A1E27;
  --border:    #252A36;
  --border-mid:#3C4358;
  --text-1:    #F0F2F7;
  --text-2:    #9199AC;
  --text-3:    #5A6178;
  --brand:     #26CC48;
  --brand-dim: #1DB53E;
  --brand-bg:  rgba(38,204,72,.1);
  --neg:       #EF4444;
  --neg-dim:   #DC2626;
  --neg-bg:    rgba(239,68,68,.1);
  --warn:      #F59E0B;
  --warn-bg:   rgba(245,158,11,.1);
  --blue:      #60A5FA;
  --blue-bg:   rgba(96,165,250,.1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{font-family:var(--font);background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
input{font-family:inherit;}

/* ── Proto shell ── */
.proto-shell{min-height:100vh;display:flex;flex-direction:column;}

.proto-bar{
  position:sticky;top:0;z-index:200;background:var(--surface);
  border-bottom:1px solid var(--border);padding:0 var(--s16);
  display:flex;align-items:center;gap:var(--s12);height:48px;
}
.proto-logo{display:flex;align-items:center;gap:var(--s8);font-weight:700;font-size:15px;}
.proto-logo-mark{
  width:24px;height:24px;border-radius:var(--r4);background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:11px;
}
.proto-title{font-size:12px;font-weight:500;color:var(--text-2);}
.proto-badge{
  padding:2px 7px;border-radius:var(--r2);font-size:10px;font-weight:600;
  background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn);
  letter-spacing:.2px;
}
.proto-bar-right{margin-left:auto;display:flex;align-items:center;gap:var(--s8);}
.theme-btn{
  width:28px;height:28px;border-radius:var(--r4);background:var(--surface-sub);
  display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;
}

.step-nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 var(--s12);display:flex;align-items:center;
  overflow-x:auto;scrollbar-width:none;
}
.step-nav::-webkit-scrollbar{display:none;}
.step-item{
  display:flex;align-items:center;gap:var(--s6);padding:var(--s8) var(--s8);
  cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .12s;flex-shrink:0;
}
.step-item:hover{background:var(--surface-sub);}
.step-item.active{border-bottom-color:var(--brand);}
.step-num{
  width:18px;height:18px;border-radius:var(--rfull);
  background:var(--surface-sub);border:1px solid var(--border);
  font-size:9px;font-weight:700;color:var(--text-3);
  display:flex;align-items:center;justify-content:center;
}
.step-item.active .step-num,.step-item.visited .step-num{
  background:var(--brand);border-color:var(--brand);color:#fff;
}
.step-label{font-size:11px;font-weight:500;color:var(--text-3);}
.step-item.active .step-label{color:var(--text-1);font-weight:600;}
.step-item.visited .step-label{color:var(--text-2);}
.step-arrow{font-size:10px;color:var(--border-mid);padding:0 2px;}

.proto-stage{
  flex:1;display:flex;align-items:flex-start;justify-content:center;
  padding:var(--s20) var(--s16);gap:var(--s24);
}

/* ── Phone frame — minimal ── */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:var(--s12);}
.phone-frame{
  width:375px;flex-shrink:0;
  background:var(--surface);
  border-radius:16px;
  border:1.5px solid var(--text-1);
  box-shadow:var(--shadow-md);
  overflow:hidden;
}
.phone-status{
  height:20px;background:var(--text-1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--s16);
}
.phone-status-time{font-size:9px;font-weight:700;color:rgba(255,255,255,.7);}
.phone-status-icons{font-size:8px;color:rgba(255,255,255,.6);}
.phone-screen{background:var(--bg);min-height:640px;position:relative;overflow:hidden;}

/* nav controls */
.phone-nav{display:flex;align-items:center;gap:var(--s12);}
.nav-btn{
  width:36px;height:36px;border-radius:var(--r6);
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;color:var(--text-2);
  transition:all .12s;
}
.nav-btn:hover:not(:disabled){background:var(--text-1);color:var(--surface);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.step-counter{font-size:11px;font-weight:600;color:var(--text-3);min-width:44px;text-align:center;}
.step-dots{display:flex;gap:4px;align-items:center;}
.step-dot{width:5px;height:5px;border-radius:var(--rfull);background:var(--border-mid);transition:all .15s;}
.step-dot.active{width:14px;border-radius:2px;background:var(--brand);}

/* animation */
.screen-content.slide-in-right{animation:slideInR .22s cubic-bezier(.4,0,.2,1) both;}
.screen-content.slide-in-left{animation:slideInL .22s cubic-bezier(.4,0,.2,1) both;}
@keyframes slideInR{from{transform:translateX(32px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInL{from{transform:translateX(-32px);opacity:0}to{transform:translateX(0);opacity:1}}

/* annotation */
.annotation-panel{width:280px;flex-shrink:0;padding-top:4px;}
.ann-card{
  background:var(--surface);border-radius:var(--r6);
  border:1px solid var(--border);padding:var(--s12) var(--s14);
  box-shadow:var(--shadow-sm);
}
.ann-screen-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:var(--r2);
  font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  background:var(--blue-bg);color:var(--blue);margin-bottom:var(--s8);
  border:1px solid var(--blue);
}
.ann-title{font-size:13px;font-weight:700;margin-bottom:var(--s4);}
.ann-desc{font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:var(--s12);}
.ann-points{list-style:none;display:flex;flex-direction:column;gap:var(--s6);}
.ann-points li{display:flex;gap:var(--s6);font-size:11px;color:var(--text-2);line-height:1.5;}
.ann-dot{
  width:14px;height:14px;border-radius:var(--rfull);
  background:var(--brand);color:#fff;font-size:8px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
}
.ann-dot.warn{background:var(--warn);}
.ann-dot.blue{background:var(--blue);}
.ann-cta{
  margin-top:var(--s10);padding-top:var(--s10);border-top:1px solid var(--border);
  font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:var(--s6);
}

/* ── App chrome ── */
.app-bar{
  background:var(--surface);padding:var(--s8) var(--s12);
  display:flex;align-items:center;border-bottom:1px solid var(--border);gap:var(--s8);
  height:44px;
}
.back-btn{
  width:28px;height:28px;border-radius:var(--r4);
  background:var(--surface-sub);display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--text-2);flex-shrink:0;cursor:pointer;
}
.bar-title{font-size:14px;font-weight:700;flex:1;letter-spacing:-.2px;}
.bar-sub{font-size:10px;color:var(--text-2);}
.icon-btn{
  width:28px;height:28px;border-radius:var(--r4);background:var(--surface-sub);
  display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;
}

/* ── Instrument header (compact) ── */
.instr-header{
  background:var(--surface);padding:var(--s8) var(--s12);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.instr-left{display:flex;align-items:center;gap:var(--s8);}
.instr-logo{
  width:28px;height:28px;border-radius:var(--rfull);
  background:linear-gradient(135deg,#0052b4,#0095e8);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;flex-shrink:0;
}
.instr-name{font-size:14px;font-weight:700;}
.instr-exch{font-size:10px;color:var(--text-3);}
.instr-right{text-align:right;}
.instr-price{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
.instr-chg{font-size:11px;font-weight:600;}
.chg-up{color:var(--brand);}
.chg-dn{color:var(--neg);}

/* ── Direction toggle ── */
.dir-wrap{
  background:var(--surface);padding:var(--s8) var(--s12);
  border-bottom:1px solid var(--border);
}
.dir-tabs{
  display:flex;border:1px solid var(--border);border-radius:var(--r4);overflow:hidden;
}
.dir-tab{
  flex:1;height:32px;font-size:12px;font-weight:600;
  background:var(--surface-sub);color:var(--text-3);
  cursor:pointer;transition:all .1s;
}
.dir-tab.active-buy{background:var(--brand);color:#fff;}
.dir-tab.active-sell{background:var(--neg);color:#fff;}
.dir-tab:hover:not(.active-buy):not(.active-sell){background:var(--border);color:var(--text-2);}

/* ── Order type tabs ── */
.ot-wrap{
  background:var(--surface);padding:var(--s6) var(--s12);
  border-bottom:1px solid var(--border);
}
.ot-tabs{display:flex;gap:0;}
.ot-tab{
  padding:4px var(--s10);font-size:11px;font-weight:500;
  color:var(--text-3);cursor:pointer;transition:all .1s;
  border-bottom:2px solid transparent;
}
.ot-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600;}
.ot-tab.active-tlo{color:var(--brand);border-bottom-color:var(--brand);font-weight:700;}

/* ── Form section ── */
.form-sec{background:var(--surface);padding:var(--s12);}
.form-row{margin-bottom:var(--s10);}
.f-label{
  font-size:var(--t-label);font-weight:600;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:var(--s4);
  display:flex;justify-content:space-between;align-items:center;
}
.f-hint{font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0;font-weight:400;}

.input-wrap{position:relative;}
.input-f{
  width:100%;height:40px;
  border:1.5px solid var(--border);border-radius:var(--r4);
  background:var(--surface);
  font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;
  color:var(--text-1);padding:0 var(--s10) 0 24px;
  outline:none;transition:border-color .12s;cursor:text;
}
.input-f:focus{border-color:var(--brand);}
.input-f.error{border-color:var(--neg) !important;}
.input-f.shares{padding-left:var(--s10);padding-right:40px;}
.input-pre{
  position:absolute;left:var(--s8);top:50%;transform:translateY(-50%);
  font-size:13px;font-weight:500;color:var(--text-3);pointer-events:none;
}
.input-suf{
  position:absolute;right:var(--s8);top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:600;color:var(--text-3);pointer-events:none;
}
.field-err{font-size:11px;color:var(--neg);margin-top:3px;font-weight:500;min-height:14px;}

/* compact shortcuts */
.shortcuts{
  display:flex;gap:var(--s6);margin-top:var(--s4);flex-wrap:wrap;
}
.sc-btn{
  padding:2px var(--s8);border-radius:var(--r2);font-size:11px;font-weight:500;
  background:transparent;border:1px solid var(--border);color:var(--text-2);cursor:pointer;
  transition:all .1s;
}
.sc-btn.sel,.sc-btn:hover{
  border-color:var(--brand);color:var(--brand);background:var(--brand-bg);
}
.tick-note{font-size:10px;color:var(--text-3);margin-top:3px;}

/* market data strip */
.mkt-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;
  background:var(--surface-sub);border-radius:var(--r4);
  padding:var(--s6) var(--s8);gap:0;margin-bottom:var(--s8);
}
.mkt-cell{text-align:center;}
.mkt-lbl{font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.3px;}
.mkt-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px;}
.mkt-ask{color:var(--brand);}
.mkt-bid{color:var(--neg);}

/* TLO note (compact inline) */
.tlo-note{
  font-size:11px;color:var(--blue);
  background:var(--blue-bg);border-left:2px solid var(--blue);
  padding:4px var(--s8);border-radius:0 var(--r2) var(--r2) 0;
  margin-bottom:var(--s8);line-height:1.4;
}

/* summary — dense key-value */
.summary{border-top:1px solid var(--border);margin-top:var(--s8);}
.s-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--s6) 0;border-bottom:1px solid var(--border);
}
.s-row:last-child{border-bottom:none;}
.s-k{font-size:11px;color:var(--text-3);}
.s-v{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-1);}
.s-v.brand{color:var(--brand);}
.s-v.err{color:var(--neg);}

/* validation inline banner (compact) */
.val-note{
  font-size:11px;padding:4px var(--s8);margin-bottom:var(--s8);
  border-radius:var(--r2);display:flex;gap:var(--s6);align-items:flex-start;
}
.val-note.ok{background:var(--brand-bg);color:var(--brand);border-left:2px solid var(--brand);}
.val-note.err{background:var(--neg-bg);color:var(--neg);border-left:2px solid var(--neg);}
.val-note.info{background:var(--blue-bg);color:var(--blue);border-left:2px solid var(--blue);}
.val-note b{font-weight:700;}

/* ── CTA ── */
.cta-bar{
  display:flex;gap:var(--s8);padding:var(--s8) var(--s12);
  background:var(--surface);border-top:1px solid var(--border);
}
.btn-primary{
  flex:1;height:42px;border-radius:var(--r6);
  font-size:14px;font-weight:700;cursor:pointer;
  border:none;transition:background .12s;
}
.btn-buy{background:var(--brand);color:#fff;}
.btn-buy:hover{background:var(--brand-dim);}
.btn-sell-cta{background:var(--neg);color:#fff;}
.btn-sell-cta:hover{background:var(--neg-dim);}
.btn-buy.btn-form-invalid{background:var(--border-mid) !important;opacity:.6;cursor:not-allowed;}
.btn-sec{
  flex:1;height:42px;border-radius:var(--r6);font-size:14px;font-weight:600;
  cursor:pointer;background:var(--surface-sub);color:var(--text-2);
  border:1px solid var(--border);
}

/* ── Confirmation (less celebratory) ── */
.confirm-screen{
  background:var(--surface);min-height:640px;
  padding:var(--s20) var(--s16);
}
.confirm-header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:var(--s12);border-bottom:1px solid var(--border);
  margin-bottom:var(--s16);
}
.confirm-title{font-size:16px;font-weight:700;}
.confirm-status{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r2);
  background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn);
  text-transform:uppercase;letter-spacing:.3px;
}
.confirm-asset{
  display:flex;align-items:center;gap:var(--s8);
  padding:var(--s10) 0;border-bottom:1px solid var(--border);margin-bottom:var(--s12);
}
.confirm-rows{display:flex;flex-direction:column;}
.confirm-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--s8) 0;border-bottom:1px solid var(--border);
}
.confirm-row:last-child{border:none;}
.ck{font-size:11px;color:var(--text-3);}
.cv{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.cv.brand{color:var(--brand);}
.cv.warn{color:var(--warn);}

/* ── Portfolio ── */
.port-header{
  background:var(--surface);padding:var(--s10) var(--s12);
  border-bottom:1px solid var(--border);
}
.port-title{font-size:15px;font-weight:700;}
.port-sub{font-size:10px;color:var(--text-3);margin-top:1px;}
.port-stats{display:flex;gap:var(--s16);margin-top:var(--s8);}
.ps-k{font-size:9px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.3px;}
.ps-v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;}
.ps-v.pos{color:var(--brand);}

.filter-bar{
  padding:var(--s6) var(--s12);display:flex;gap:var(--s4);
  background:var(--surface);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none;}
.f-chip{
  padding:3px var(--s8);border-radius:var(--r2);font-size:11px;font-weight:500;
  flex-shrink:0;background:var(--surface-sub);border:1px solid var(--border);
  color:var(--text-2);cursor:pointer;transition:all .1s;
}
.f-chip.on{background:var(--brand-bg);border-color:var(--brand);color:var(--brand);font-weight:600;}

.pos-list{padding:var(--s6) var(--s12);display:flex;flex-direction:column;gap:var(--s4);background:var(--bg);}
.pos-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r4);overflow:hidden;cursor:pointer;
}
.pos-head{padding:var(--s8) var(--s10);display:flex;align-items:center;gap:var(--s8);}
.pos-logo{
  width:28px;height:28px;border-radius:var(--rfull);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;flex-shrink:0;
}
.pos-logo.aapl{background:linear-gradient(135deg,#555,#222);}
.pos-logo.tsla{background:linear-gradient(135deg,#CC0000,#e31010);}
.pos-logo.nvda{background:linear-gradient(135deg,#76b900,#529900);}
.pos-name{font-size:13px;font-weight:700;}
.pos-meta{font-size:10px;color:var(--text-3);margin-top:1px;display:flex;align-items:center;gap:4px;}
.pos-price-col{margin-left:auto;text-align:right;}
.pos-price{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.pos-pl{font-size:11px;font-weight:600;}
.pos-pl.pos{color:var(--brand);}

/* status chips — restrained */
.sc-chip{
  display:inline-flex;align-items:center;gap:3px;
  padding:1px 5px;border-radius:var(--r2);
  font-size:9px;font-weight:700;letter-spacing:.2px;text-transform:uppercase;
}
.chip-pending{background:var(--warn-bg);color:var(--warn);}
.chip-partial{background:var(--blue-bg);color:var(--blue);}
.chip-filled{background:var(--brand-bg);color:var(--brand);}
.chip-cancelled{background:var(--surface-sub);color:var(--text-3);border:1px solid var(--border);}
.tlo-mark{
  display:inline-flex;padding:1px 4px;border-radius:var(--r2);
  font-size:9px;font-weight:700;letter-spacing:.2px;
  background:var(--brand-bg);color:var(--brand);border:1px solid var(--brand);
}

/* fill bar */
.fill-sec{padding:0 var(--s10) var(--s8);}
.fill-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.fill-lbl{font-size:10px;color:var(--text-3);}
.fill-cnt{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums;}
.fill-cnt .fn{color:var(--brand);}
.fill-track{height:4px;border-radius:var(--rfull);background:var(--surface-sub);overflow:hidden;}
.fill-bar{height:100%;border-radius:var(--rfull);background:var(--brand);}
.fill-bar.partial{background:var(--blue);}
.fill-bar.zero{background:var(--warn);width:3px;}

/* card actions */
.card-actions{
  padding:var(--s6) var(--s10);display:flex;gap:var(--s6);
  border-top:1px solid var(--border);
}
.act-cancel{
  flex:1;padding:5px;border-radius:var(--r4);font-size:11px;font-weight:600;
  cursor:pointer;background:var(--neg-bg);color:var(--neg);
  border:1px solid var(--neg);transition:all .1s;
}
.act-cancel:hover{background:var(--neg);color:#fff;}
.act-detail{
  flex:1;padding:5px;border-radius:var(--r4);font-size:11px;font-weight:600;
  cursor:pointer;background:var(--surface-sub);color:var(--text-2);
  border:1px solid var(--border);
}

/* bottom sheet */
.sheet-wrap{position:relative;min-height:640px;}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:10;}
.sheet-bg-content{position:relative;z-index:1;}
.bottom-sheet{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:var(--surface);border-radius:12px 12px 0 0;
  padding:var(--s16) var(--s12) var(--s20);border-top:1px solid var(--border);
}
.sheet-handle{width:32px;height:3px;border-radius:var(--rfull);background:var(--border-mid);margin:0 auto var(--s12);}
.sheet-title{font-size:15px;font-weight:700;margin-bottom:var(--s4);}
.sheet-desc{font-size:12px;color:var(--text-2);line-height:1.5;margin-bottom:var(--s12);}
.sheet-card{
  background:var(--surface-sub);border-radius:var(--r4);
  padding:var(--s8) var(--s10);margin-bottom:var(--s10);border:1px solid var(--border);
}
.sheet-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.sr-k{color:var(--text-3);}
.sr-v{font-weight:700;font-variant-numeric:tabular-nums;}
.sheet-warn{
  background:var(--warn-bg);border-left:2px solid var(--warn);
  padding:var(--s6) var(--s8);font-size:11px;color:var(--warn);
  line-height:1.5;display:flex;gap:var(--s6);margin-bottom:var(--s12);
}
.sheet-btns{display:flex;gap:var(--s8);}
.s-btn{flex:1;height:40px;border-radius:var(--r6);font-size:13px;font-weight:700;cursor:pointer;border:none;}
.s-btn.confirm{background:var(--neg);color:#fff;}
.s-btn.keep{background:var(--surface-sub);color:var(--text-1);border:1px solid var(--border);}

/* detail fill counter */
.detail-fill-box{
  background:var(--surface-sub);border-radius:var(--r4);
  padding:var(--s10) var(--s12);margin:0 var(--s12) var(--s8);
  border:1px solid var(--border);text-align:center;
}
.big-fill{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;}
.big-fill .fn{color:var(--blue);}
.big-fill .sep{font-size:14px;color:var(--text-3);margin:0 3px;}
.fill-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* Post-cancel strip */
.cancel-confirm-strip{
  background:var(--brand-bg);border-bottom:1px solid var(--brand);
  padding:var(--s6) var(--s12);display:flex;align-items:center;gap:var(--s6);
  font-size:11px;color:var(--brand);font-weight:600;
}

/* Switch button */
.switch-btn{
  width:100%;padding:7px;border-radius:var(--r4);
  font-size:12px;font-weight:600;margin-top:var(--s6);
  background:var(--brand-bg);color:var(--brand);
  border:1px solid var(--brand);cursor:pointer;transition:background .1s;
}
.switch-btn:hover{background:var(--brand);color:#fff;}

/* SELL validation table */
.sell-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:var(--s8);}
.sell-table td{padding:5px var(--s8);border-bottom:1px solid var(--border);}
.sell-table tr:last-child td{border:none;}
.sell-table .t-k{color:var(--text-3);}
.sell-table .t-ok{color:var(--brand);font-weight:700;}
.sell-table .t-no{color:var(--neg);font-weight:700;}

@media(max-width:780px){.annotation-panel{display:none;}.proto-stage{padding:var(--s12) var(--s8);}}
</style>

/* ============================================================
   PROTOTYPE ENGINE
   ============================================================ */
let currentStep = 0;
let direction = 'forward';

function buildStepNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) => {
    const visited = i < currentStep ? 'visited' : '';
    const active = i === currentStep ? 'active' : '';
    const arrow = i < STEPS.length - 1 ? '<span class="step-arrow" aria-hidden="true">›</span>' : '';
    return `<button class="step-item ${active} ${visited}" onclick="goTo(${i})" aria-label="Go to screen ${i+1}: ${s.label}" aria-current="${i === currentStep ? 'step' : 'false'}">
        <div class="step-num" aria-hidden="true">${i + 1}</div>
        <span class="step-label">${s.label}</span>
      </button>${arrow}`;
  }).join('');
}

function buildDots() {
  const dots = document.getElementById('stepDots');
  dots.innerHTML = STEPS.map((s, i) =>
    `<div class="step-dot ${i === currentStep ? 'active' : ''}" role="presentation" aria-hidden="true"></div>`
  ).join('');
}

function buildAnnotation() {
  const s = STEPS[currentStep];
  const ann = document.getElementById('annotationPanel');
  ann.innerHTML = `
    <div class="ann-card">
      <div class="ann-screen-tag">${s.tag}</div>
      <div class="ann-title">${s.title}</div>
      <div class="ann-desc">${s.desc}</div>
      <ul class="ann-points">
        ${s.points.map(p => `
          <li>
            <div class="ann-dot ${p.type === 'warn' ? 'warn' : p.type === 'blue' ? 'blue' : ''}" aria-hidden="true">✓</div>
            <span>${p.text}</span>
          </li>
        `).join('')}
      </ul>
      <div class="ann-cta">
        <span style="font-size:16px;" aria-hidden="true">👆</span>
        <span>${s.cta}</span>
      </div>
    </div>
  `;
}

function renderScreen(dir) {
  const screen = document.getElementById('phoneScreen');
  const s = STEPS[currentStep];
  const animClass = dir === 'forward' ? 'slide-in-right' : 'slide-in-left';
  screen.innerHTML = s.html();
  const content = screen.querySelector('.screen-content, .sheet-wrap');
  if (content) {
    content.classList.add(animClass);
    setTimeout(() => content.classList.remove(animClass), 300);
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  direction = idx > currentStep ? 'forward' : 'backward';
  currentStep = idx;
  renderScreen(direction);
  buildStepNav();
  buildDots();
  buildAnnotation();
  if (idx === 1) setTimeout(validateForm, 10); // TLO entry screen
  document.getElementById('stepCounter').textContent = `${currentStep + 1} / ${STEPS.length}`;
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('nextBtn').disabled = currentStep === STEPS.length - 1;
  const activeItem = document.querySelector('.step-item.active');
  if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-btn').textContent = isDark ? '🌙' : '☀️';
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentStep + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(currentStep - 1);
});


/* ─── Event delegation ──────────────────────────────────────────── */
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;

  /* Chip selection — toggle active state AND update bound form values */
  if (btn.classList.contains('chip') && !btn.classList.contains('f-chip')) {
    const group = btn.closest('[role="group"]') || btn.parentElement;
    if (group) {
      group.querySelectorAll('.chip').forEach(c => {
        c.classList.remove('sel');
        c.setAttribute('aria-pressed', 'false');
      });
      btn.classList.add('sel');
      btn.setAttribute('aria-pressed', 'true');
    }

    /* Amount chips (Screen 1 — Market Order) */
    if (btn.dataset.amount) {
      const amt = parseInt(btn.dataset.amount);
      const mktPrice = 186.42;
      const shares = Math.floor(amt / mktPrice);
      const inp = document.getElementById('mkt-amount-input');
      if (inp) inp.value = amt >= 1000
        ? '$' + (amt/1000).toFixed(0) + ',000.00'
        : '$' + amt.toFixed(0) + '.00';
      const estEl = document.getElementById('mkt-est-shares');
      if (estEl) estEl.textContent = shares < 1 ? '< 1 share ⚠' : '~' + shares + ' shares';
      const totalEl = document.getElementById('mkt-total');
      if (totalEl) totalEl.textContent = shares < 1 ? '—' :
        '$' + (shares * mktPrice + 1.99).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
      return;
    }

    /* Price chips (Screen 2 — TLO Entry) */
    if (btn.dataset.price) {
      const price = parseFloat(btn.dataset.price);
      const ask = 186.45;
      const pInp = document.getElementById('tlo-price-input');
      if (pInp) pInp.value = price.toFixed(2);
      const sEl = document.getElementById('tlo-summary-price');
      if (sEl) sEl.textContent = '$' + price.toFixed(2);
      // Update reserved (use current shares)
      const sharesInp = document.querySelector('.input-f.shares');
      const shares = sharesInp ? parseInt(sharesInp.value) || 5 : 5;
      const reserved = (price * shares).toFixed(2);
      const resEl = document.getElementById('tlo-summary-reserved');
      if (resEl) resEl.textContent = '$' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2});
      const bText = document.getElementById('tlo-reserve-text');
      if (bText) bText.innerHTML = '<b>Balance reserved at limit price</b> $' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
      return;
    }

    /* Share chips (Screen 2 — TLO Entry) */
    if (btn.dataset.shares) {
      const shares = parseInt(btn.dataset.shares);
      const sharesInp = document.querySelector('.input-f.shares');
      if (sharesInp) sharesInp.value = shares;
      const qEl = document.getElementById('tlo-summary-qty');
      if (qEl) qEl.textContent = shares + ' shares';
      const pInp = document.getElementById('tlo-price-input');
      const price = pInp ? parseFloat(pInp.value) || 184.56 : 184.56;
      const reserved = (price * shares).toFixed(2);
      const resEl = document.getElementById('tlo-summary-reserved');
      if (resEl) resEl.textContent = '$' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2});
      const bText3 = document.getElementById('tlo-reserve-text');
      if (bText3) bText3.innerHTML = '<b>Balance reserved at limit price</b> $' + parseFloat(reserved).toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
      return;
    }

    return;
  }

  /* Portfolio filter chips */
  if (btn.classList.contains('f-chip')) {
    const bar = btn.closest('.filter-bar');
    if (bar) {
      bar.querySelectorAll('.f-chip').forEach(c => {
        c.classList.remove('on');
        c.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('on');
      btn.setAttribute('aria-selected', 'true');
    }
    return;
  }

  /* BUY / SELL direction toggle */
  if ((btn.textContent.trim() === 'BUY' || btn.textContent.trim() === 'SELL')
      && btn.closest('[role="group"]')) {
    const group = btn.closest('[role="group"]');
    group.querySelectorAll('button').forEach(b => {
      b.classList.remove('active', 'buy', 'sell');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
    if (btn.textContent.trim() === 'BUY') btn.classList.add('buy');
    if (btn.textContent.trim() === 'SELL') btn.classList.add('sell');
    return;
  }
});

/* ─── Live input handlers (manual typing) ─────────────────────────── */
document.addEventListener('input', function(e) {
  const inp = e.target;

  /* Manual price entry — Screen 2 TLO */
  if (inp.id === 'tlo-price-input') {
    const price = parseFloat(inp.value);
    const ask = 186.45;
    if (isNaN(price)) return;

    // Deselect all price chips
    document.querySelectorAll('[data-price]').forEach(c => {
      c.classList.remove('sel');
      c.setAttribute('aria-pressed', 'false');
    });
    // Select matching chip if exact match
    document.querySelectorAll('[data-price]').forEach(c => {
      if (parseFloat(c.dataset.price) === price) {
        c.classList.add('sel');
        c.setAttribute('aria-pressed', 'true');
      }
    });

    // Update summary price
    const sEl = document.getElementById('tlo-summary-price');
    if (sEl) sEl.textContent = isNaN(price) ? '—' : '$' + price.toFixed(2);

    // Update reserved
    const sharesInp = document.getElementById('tlo-shares-input') || document.querySelector('.input-f.shares');
    const shares = sharesInp ? parseInt(sharesInp.value) || 5 : 5;
    const reserved = price * shares;
    const resEl = document.getElementById('tlo-summary-reserved');
    if (resEl) resEl.textContent = isNaN(reserved) ? '—' : '$' + reserved.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const bText4 = document.getElementById('tlo-reserve-text');
    if (bText4 && !isNaN(reserved)) bText4.innerHTML = '<b>Balance reserved at limit price</b> $' + reserved.toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
    validateForm();

    // Validation banner
    const valBanner = document.getElementById('price-validation');
    if (valBanner) {
      if (price > ask * 1.02) {
        valBanner.className = 'val-banner err';
        valBanner.innerHTML = '<span class="val-icon">⚠</span><div><b>Price exceeds Ask + tolerance</b>$' + price.toFixed(2) + ' is ' + ((price/ask-1)*100).toFixed(2) + '% above Ask ($' + ask + '). Max +2%. Reduce your price.</div>';
      } else if (price <= 0) {
        valBanner.className = 'val-banner err';
        valBanner.innerHTML = '<span class="val-icon">⚠</span><div><b>Invalid price</b>Enter a valid limit price.</div>';
      } else {
        const pctBelow = ((ask - price) / ask * 100).toFixed(2);
        valBanner.className = 'val-banner ok';
        valBanner.innerHTML = '<span class="val-icon">✓</span><div><b>Price valid — below Ask</b>$' + price.toFixed(2) + ' is ' + pctBelow + '% below Ask. Order will rest until price reaches your level.</div>';
      }
    }
    return;
  }

  /* Manual shares entry — Screen 2 TLO */
  if (inp.id === 'tlo-shares-input' || (inp.classList.contains('input-f') && inp.classList.contains('shares') && !inp.id)) {
    validateForm();  // always validate first — catches fractional, empty, zero
    const shares = parseInt(inp.value);
    if (isNaN(shares) || shares < 1) return;

    // Deselect all share chips
    document.querySelectorAll('[data-shares]').forEach(c => {
      c.classList.remove('sel');
      c.setAttribute('aria-pressed', 'false');
    });
    document.querySelectorAll('[data-shares]').forEach(c => {
      if (parseInt(c.dataset.shares) === shares) {
        c.classList.add('sel');
        c.setAttribute('aria-pressed', 'true');
      }
    });

    const qEl = document.getElementById('tlo-summary-qty');
    if (qEl) qEl.textContent = shares + ' shares';

    const priceInp = document.getElementById('tlo-price-input');
    const price = priceInp ? parseFloat(priceInp.value) || 184.56 : 184.56;
    const reserved = price * shares;
    const resEl = document.getElementById('tlo-summary-reserved');
    if (resEl) resEl.textContent = '$' + reserved.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const bannerText = document.getElementById('tlo-reserve-text');
    if (bannerText) bannerText.innerHTML = '<b>Balance reserved at limit price</b> $' + reserved.toLocaleString('en-US',{minimumFractionDigits:2}) + ' (' + shares + ' × $' + price.toFixed(2) + ') held until filled or cancelled.';
    validateForm();  // re-run after updating to ensure consistent state
    return;
  }

  /* Manual amount entry — Screen 1 */
  if (inp.id === 'mkt-amount-input') {
    const raw = inp.value.replace(/[^0-9.]/g, '');
    const amt = parseFloat(raw);
    if (isNaN(amt)) return;
    const mktPrice = 186.42;
    const shares = Math.floor(amt / mktPrice);
    const estEl = document.getElementById('mkt-est-shares');
    if (estEl) estEl.textContent = shares < 1 ? '< 1 share ⚠' : '~' + shares + ' shares';
    const totalEl = document.getElementById('mkt-total');
    if (totalEl) totalEl.textContent = shares < 1 ? '—' : '$' + (shares * mktPrice + 1.99).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    return;
  }
});

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 16px;border-radius:99px;font-size:12px;font-weight:600;z-index:9999;pointer-events:none;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

/* ─── Order state — shared between TLO entry and Confirmation ─── */
let orderState = { price: 184.56, shares: 5 };

function validateAndSubmit() {
  const sbtn = document.getElementById('place-limit-btn');
  if (sbtn && sbtn.disabled) return;
  const priceEl = document.getElementById('tlo-price-input');
  const sharesEl = document.getElementById('tlo-shares-input');

  const priceRaw = priceEl ? priceEl.value.replace(/[^0-9.]/g, '') : '184.56';
  const sharesRaw = sharesEl ? sharesEl.value.replace(/[^0-9.]/g, '') : '5';
  const price = parseFloat(priceRaw);
  const sharesFloat = parseFloat(sharesRaw);
  const shares = Math.floor(sharesFloat);
  const ask = 186.45;

  // Validate price
  if (isNaN(price) || price <= 0) {
    return showToast('Enter a valid limit price');
  }
  if (price > ask * 1.02) {
    return showToast('Price too high — exceeds Ask + 2% tolerance. Reduce your price.');
  }

  // Validate shares — whole numbers only
  if (isNaN(sharesFloat) || sharesFloat < 1) {
    return showToast('Enter at least 1 whole share');
  }
  if (sharesFloat !== shares) {
    // Fractional entered — block and show error
    if (sharesEl) {
      sharesEl.value = shares || 1;
      sharesEl.style.borderColor = 'var(--color-negative)';
      setTimeout(() => { sharesEl.style.borderColor = ''; }, 1500);
    }
    return showToast('Whole shares only — ' + sharesFloat + ' rounded down to ' + shares + '. Update before placing.');
  }

  // All valid — store state and navigate to confirmation
  orderState = { price, shares, reserved: (price * shares).toFixed(2) };
  const submitBtn = document.getElementById('place-limit-btn');
  if (submitBtn) { submitBtn.style.background = ''; submitBtn.style.opacity = ''; }
  goTo(3);
}

function validateForm() {
  const priceEl = document.getElementById('tlo-price-input');
  const sharesEl = document.getElementById('tlo-shares-input');
  const btn = document.getElementById('place-limit-btn');
  if (!priceEl || !sharesEl || !btn) return;

  const price = parseFloat(priceEl.value);
  const sharesRaw = sharesEl ? sharesEl.value : '5';
  const sharesFloat = parseFloat(sharesRaw);
  const shares = Math.floor(sharesFloat);
  const ask = 186.45;

  let isValid = true, priceErr = '', sharesErr = '';

  if (isNaN(price) || price <= 0) { priceErr = 'Enter a valid price'; isValid = false; }
  else if (price > ask * 1.02) { priceErr = 'Price ' + price.toFixed(2) + ' exceeds Ask+2% (' + (ask*1.02).toFixed(2) + ')'; isValid = false; }

  if (isNaN(sharesFloat) || sharesFloat < 1) { sharesErr = 'Minimum 1 whole share'; isValid = false; }
  else if (!/^\d+$/.test(sharesRaw.trim()) || sharesFloat !== shares) { sharesErr = 'Whole shares only — ' + sharesRaw + ' is not a whole number'; isValid = false; }

  // Inline error elements — create if missing
  function ensureErr(id, afterEl) {
    let el = document.getElementById(id);
    if (!el && afterEl) {
      el = document.createElement('div');
      el.id = id;
      el.style.cssText = 'font-size:11px;color:var(--color-negative);margin-top:4px;font-weight:600;min-height:14px;';
      afterEl.parentNode.insertBefore(el, afterEl.nextSibling);
    }
    return el;
  }
  const pErrEl = ensureErr('price-inline-err', priceEl.parentElement);
  const sErrEl = ensureErr('shares-inline-err', sharesEl ? sharesEl.parentElement : null);
  if (pErrEl) pErrEl.textContent = priceErr;
  if (sErrEl) sErrEl.textContent = sharesErr;

  // Borders
  priceEl.style.borderColor = priceErr ? 'var(--color-negative)' : '';
  if (sharesEl) sharesEl.style.borderColor = sharesErr ? 'var(--color-negative)' : '';

  // Update the main validation banner to reflect ALL errors
  const mainBanner = document.getElementById('price-validation');
  if (mainBanner) {
    if (!isValid) {
      // Show most relevant error in the main banner
      const mainErr = priceErr || sharesErr;
      mainBanner.className = 'val-banner err';
      mainBanner.innerHTML = '<span class="val-icon">⚠</span><div><b>' +
        (sharesErr ? 'Whole shares only' : 'Invalid price') +
        '</b>' + mainErr + '</div>';
    } else {
      // Restore green ok state
      const price = parseFloat(priceEl.value);
      const ask = 186.45;
      const pctBelow = ((ask - price) / ask * 100).toFixed(2);
      mainBanner.className = 'val-banner ok';
      mainBanner.innerHTML = '<span class="val-icon">✓</span><div><b>Price valid — below Ask</b>$' +
        price.toFixed(2) + ' is ' + pctBelow + '% below Ask. Order rests until price hits your level.</div>';
    }
  }

  // Button — change background color for unmistakable disabled state
  if (isValid) {
    btn.disabled = false;
    btn.removeAttribute('aria-disabled');
    btn.style.background = '';
    btn.style.opacity = '';
    btn.style.cursor = '';
  } else {
    btn.disabled = true;
    btn.setAttribute('aria-disabled', 'true');
    btn.style.background = 'var(--color-border-strong)';
    btn.style.opacity = '0.7';
    btn.style.cursor = 'not-allowed';
  }
}

// Init
goTo(0);
</script>
