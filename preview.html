<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLO Screen 2 Preview — Set Limit Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── eToro DS dark tokens (from screenshots + known brand values) ─── */
:root {
  /* Backgrounds */
  --bg-app:    #000000;
  --bg-sheet:  #1C1C1E;   /* dark grey bottom sheet */
  --bg-pill:   rgba(255,255,255,.1);
  --bg-keypad: #1C1C1E;

  /* Text */
  --text-primary:   #FFFFFF;
  --text-secondary: rgba(255,255,255,.55);
  --text-tertiary:  rgba(255,255,255,.35);

  /* Brand */
  --brand-green:   #0EB12E;  /* eToro official green */
  --brand-green-cta: #0EB12E;

  /* Status */
  --status-ok:  #30D158;    /* slightly brighter green for ok indicator */
  --status-err: #FF453A;

  /* Borders / separators */
  --border:    rgba(255,255,255,.12);

  /* Radius */
  --r-pill: 27px;
  --r-sheet: 16px;

  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #111; min-height: 100vh; }
button { font-family: inherit; border: none; cursor: pointer; }

/* ─── Preview shell ─── */
.preview-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 40px;
  padding: 32px;
  background: #111;
  flex-wrap: wrap;
}
.preview-label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,.4);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: .5px;
  text-transform: uppercase;
}

/* ─── Phone frame (minimal) ─── */
.phone {
  width: 375px;
  height: 680px;
  border-radius: 44px;
  border: 1px solid rgba(255,255,255,.15);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.phone-status-bar {
  height: 44px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px 8px;
}
.status-time { font-size: 15px; font-weight: 600; color: #fff; }
.status-icons { font-size: 12px; color: rgba(255,255,255,.8); letter-spacing: 2px; }

/* ─── Screen 1: Market Order execution ─── */
.screen-market {
  background: var(--bg-app);
  height: 100%;
  display: flex;
  flex-direction: column;
  position: absolute;
  inset: 44px 0 0;
}

/* ─── Screen 2: Set Limit Order sheet over Screen 1 ─── */
.screen-limit {
  background: var(--bg-app);
  height: 100%;
  display: flex;
  flex-direction: column;
  position: absolute;
  inset: 44px 0 0;
}

.screen-behind {
  position: absolute;
  inset: 0;
  opacity: 0.45;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}

/* ─── App top bar ─── */
.exec-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 8px;
  background: transparent;
}
.exec-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-pill);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; font-weight: 300;
  -webkit-tap-highlight-color: transparent;
}
.exec-back:active { opacity: .7; }
.exec-order-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 14px; border-radius: var(--r-pill);
  background: var(--bg-pill);
  font-size: 14px; font-weight: 600; color: #fff;
  letter-spacing: -.2px;
}
.exec-order-pill .arrow { font-size: 10px; opacity: .65; }

/* ─── Asset row ─── */
.exec-asset-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 2px 20px 12px;
}
.exec-asset-icon {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: #1D1D1F;
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 800; color: #fff;
}
.exec-asset-ticker {
  font-size: 15px; font-weight: 600; color: #fff;
}
.exec-asset-dot { color: rgba(255,255,255,.3); font-size: 14px; }
.exec-asset-price {
  font-size: 15px; font-weight: 400;
  color: rgba(255,255,255,.65);
  font-variant-numeric: tabular-nums;
}

/* ─── Main amount display ─── */
.exec-amount-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 20px 12px;
  flex: 1;
}
.exec-amount-display {
  display: flex;
  align-items: flex-start;
  gap: 2px;
  margin-bottom: 14px;
}
.exec-currency {
  font-size: 28px;
  font-weight: 300;
  color: #fff;
  padding-top: 10px;
  letter-spacing: -1px;
}
.exec-amount-num {
  font-size: 62px;
  font-weight: 300;
  color: #fff;
  font-variant-numeric: tabular-nums;
  letter-spacing: -3px;
  line-height: 1;
}
.exec-shares-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: var(--r-pill);
  background: var(--bg-pill);
  font-size: 14px; font-weight: 500; color: #fff;
  margin-bottom: 8px;
}
.exec-shares-pill .refresh { opacity: .6; font-size: 13px; }
.exec-available {
  font-size: 13px;
  color: var(--text-secondary);
}

/* ─── Keypad ─── */
.keypad {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--bg-app);
  padding: 0 4px;
}
.kp-btn {
  height: 72px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 400; color: #fff;
  background: none; border: none; cursor: pointer;
  border-radius: 10px;
  -webkit-tap-highlight-color: transparent;
  transition: background .08s;
}
.kp-btn:active { background: rgba(255,255,255,.1); }
.kp-decimal { font-size: 34px; font-weight: 700; padding-bottom: 4px; }

/* ─── CTA button ─── */
.exec-cta {
  padding: 8px 20px 16px;
  background: var(--bg-app);
}
.cta-btn {
  width: 100%; height: 56px;
  border-radius: var(--r-pill);
  background: var(--brand-green-cta);
  color: #fff;
  font-size: 17px; font-weight: 700;
  letter-spacing: -.2px;
  transition: opacity .12s;
}
.cta-btn:active { opacity: .85; }
.cta-btn:disabled {
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.35);
}

/* ─── Limit Order bottom sheet ─── */
.limit-sheet-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 20;
  display: flex;
  align-items: flex-end;
}
.limit-sheet {
  width: 100%;
  background: var(--bg-sheet);
  border-radius: var(--r-sheet) var(--r-sheet) 0 0;
  padding: 12px 0 0;
  display: flex;
  flex-direction: column;
}
.sheet-handle {
  width: 40px; height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,.25);
  margin: 0 auto 18px;
}
.sheet-title {
  font-size: 18px; font-weight: 700; color: #fff;
  text-align: center; margin-bottom: 4px;
}
.sheet-subtitle {
  font-size: 13px; color: var(--text-secondary);
  text-align: center; margin-bottom: 20px;
}
.sheet-display {
  font-size: 54px; font-weight: 700; color: #fff;
  text-align: center; font-variant-numeric: tabular-nums;
  letter-spacing: -2px; min-height: 66px;
  margin-bottom: 4px; padding: 0 20px;
  line-height: 1.1;
}
.sheet-validation {
  font-size: 11px; text-align: center;
  min-height: 16px; margin-bottom: 12px;
  color: var(--status-ok);
}
.sheet-keypad {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: var(--bg-sheet);
  padding: 0 8px;
  flex: 1;
}
.sheet-keypad .kp-btn { height: 68px; font-size: 24px; }
.sheet-keypad .kp-btn:active { background: rgba(255,255,255,.08); }
.sheet-cta {
  padding: 12px 20px 24px;
  background: var(--bg-sheet);
}
.sheet-cta-btn {
  width: 100%; height: 54px;
  border-radius: var(--r-pill);
  background: var(--brand-green-cta);
  color: #fff;
  font-size: 17px; font-weight: 700;
}
.sheet-cta-btn:active { opacity: .85; }
.sheet-cta-btn:disabled {
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.35);
}
</style>
</head>
<body>
<div class="preview-shell">

  <!-- Screen 1: Market Order -->
  <div>
    <div class="preview-label">Screen 1 · Market Order</div>
    <div class="phone">
      <div class="phone-status-bar">
        <span class="status-time">9:41</span>
        <span class="status-icons">●●● ▮▮▮</span>
      </div>
      <div class="screen-market">
        <div class="exec-top-bar">
          <button class="exec-back">‹</button>
          <button class="exec-order-pill">Market Order <span class="arrow">▾</span></button>
        </div>
        <div class="exec-asset-row">
          <div class="exec-asset-icon">AAPL</div>
          <span class="exec-asset-ticker">AAPL</span>
          <span class="exec-asset-dot">·</span>
          <span class="exec-asset-price">$186.42</span>
        </div>
        <div class="exec-amount-area">
          <div class="exec-amount-display">
            <span class="exec-currency">$</span>
            <span class="exec-amount-num" id="mkt-display">10.00</span>
          </div>
          <button class="exec-shares-pill">
            ~0.05 shares <span class="refresh">⟳</span>
          </button>
          <span class="exec-available">Available: $12,440.00</span>
        </div>
        <div class="keypad">
          <button class="kp-btn" onclick="mktKp('1')">1</button>
          <button class="kp-btn" onclick="mktKp('2')">2</button>
          <button class="kp-btn" onclick="mktKp('3')">3</button>
          <button class="kp-btn" onclick="mktKp('4')">4</button>
          <button class="kp-btn" onclick="mktKp('5')">5</button>
          <button class="kp-btn" onclick="mktKp('6')">6</button>
          <button class="kp-btn" onclick="mktKp('7')">7</button>
          <button class="kp-btn" onclick="mktKp('8')">8</button>
          <button class="kp-btn" onclick="mktKp('9')">9</button>
          <button class="kp-btn kp-decimal" onclick="mktKp('.')">.</button>
          <button class="kp-btn" onclick="mktKp('0')">0</button>
          <button class="kp-btn" onclick="mktDel()">⌫</button>
        </div>
        <div class="exec-cta">
          <button class="cta-btn">Buy AAPL</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Screen 2: Set Limit Order (bottom sheet over Market screen) -->
  <div>
    <div class="preview-label">Screen 2 · Set Limit Order</div>
    <div class="phone">
      <div class="phone-status-bar">
        <span class="status-time">9:41</span>
        <span class="status-icons">●●● ▮▮▮</span>
      </div>
      <!-- Background: dimmed market screen -->
      <div style="position:absolute;inset:44px 0 0;background:#000;">
        <div class="screen-behind">
          <div class="exec-top-bar">
            <button class="exec-back">‹</button>
            <button class="exec-order-pill">Market Order <span class="arrow">▾</span></button>
          </div>
          <div class="exec-asset-row">
            <div class="exec-asset-icon">AAPL</div>
            <span class="exec-asset-ticker">AAPL</span>
            <span class="exec-asset-dot">·</span>
            <span class="exec-asset-price">$186.42</span>
          </div>
          <div class="exec-amount-area">
            <div class="exec-amount-display">
              <span class="exec-currency">$</span>
              <span class="exec-amount-num">10.00</span>
            </div>
            <button class="exec-shares-pill">~0.05 shares <span class="refresh">⟳</span></button>
            <span class="exec-available">Available: $12,440.00</span>
          </div>
        </div>
        <!-- Overlay + sheet -->
        <div class="limit-sheet-overlay">
          <div class="limit-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-title">Set Limit order</div>
            <div class="sheet-subtitle">Current Ask Price: $186.45</div>
            <div class="sheet-display" id="limit-display">184.56</div>
            <div class="sheet-validation" id="sheet-val">✓ Below Ask — order will rest at your price</div>
            <div class="sheet-keypad">
              <button class="kp-btn" onclick="limitKp('1')">1</button>
              <button class="kp-btn" onclick="limitKp('2')">2</button>
              <button class="kp-btn" onclick="limitKp('3')">3</button>
              <button class="kp-btn" onclick="limitKp('4')">4</button>
              <button class="kp-btn" onclick="limitKp('5')">5</button>
              <button class="kp-btn" onclick="limitKp('6')">6</button>
              <button class="kp-btn" onclick="limitKp('7')">7</button>
              <button class="kp-btn" onclick="limitKp('8')">8</button>
              <button class="kp-btn" onclick="limitKp('9')">9</button>
              <button class="kp-btn kp-decimal" onclick="limitKp('.')">.</button>
              <button class="kp-btn" onclick="limitKp('0')">0</button>
              <button class="kp-btn" onclick="limitDel()">⌫</button>
            </div>
            <div class="sheet-cta">
              <button class="sheet-cta-btn" id="set-limit-btn">Set limit</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* Market keypad */
var mktVal = '10.00';
function mktKp(k) {
  var d = document.getElementById('mkt-display');
  if (k === '.' && mktVal.includes('.')) return;
  if (mktVal.includes('.') && mktVal.split('.')[1].length >= 2) return;
  if (mktVal === '0' && k !== '.') mktVal = k;
  else mktVal += k;
  if (d) d.textContent = mktVal;
}
function mktDel() {
  var d = document.getElementById('mkt-display');
  if (mktVal.length <= 1) mktVal = '0';
  else mktVal = mktVal.slice(0,-1);
  if (d) d.textContent = mktVal;
}

/* Limit keypad */
var limitVal = '184.56';
var ASK = 186.45;

function limitKp(k) {
  var d = document.getElementById('limit-display');
  if (k === '.' && limitVal.includes('.')) return;
  if (limitVal.includes('.') && limitVal.split('.')[1].length >= 2) return;
  if (limitVal === '0' && k !== '.') limitVal = k;
  else limitVal += k;
  if (d) d.textContent = limitVal;
  validateLimit();
}
function limitDel() {
  var d = document.getElementById('limit-display');
  if (limitVal.length <= 1) limitVal = '0';
  else limitVal = limitVal.slice(0,-1);
  if (d) d.textContent = limitVal;
  validateLimit();
}
function validateLimit() {
  var price = parseFloat(limitVal);
  var valEl = document.getElementById('sheet-val');
  var btn = document.getElementById('set-limit-btn');
  if (!valEl) return;
  if (isNaN(price) || price <= 0) {
    valEl.style.color = '#FF453A'; valEl.textContent = 'Enter a valid price';
    btn.disabled = true; return;
  }
  if (price > ASK * 1.02) {
    valEl.style.color = '#FF453A';
    valEl.textContent = '$' + price.toFixed(2) + ' exceeds Ask + 2% (' + (ASK*1.02).toFixed(2) + ')';
    btn.disabled = true; return;
  }
  var pct = ((ASK - price) / ASK * 100).toFixed(2);
  valEl.style.color = '#30D158';
  valEl.textContent = '✓ ' + pct + '% below Ask · order rests at $' + price.toFixed(2);
  btn.disabled = false;
}
validateLimit();
</script>
</body>
</html>
