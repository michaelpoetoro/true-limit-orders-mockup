<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLO Preview — eToro Execution Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'eToro Variable';
  src: url('https://marketing.etorostatic.com/cache1/fonts/etoro/eToro-VF-v0.7.ttf') format('truetype');
  font-weight: 100 900;
  font-display: swap;
}

/* ─── DS tokens (production-accurate dark execution) ─── */
:root {
  /* Execution screen bg: near-black, slightly warm neutral */
  --exec-bg:        #0A0A0F;
  /* Sheet bg */
  --sheet-bg:       #1C1C1E;
  /* Pill/overlay bg */
  --pill-bg:        rgba(255,255,255,.1);
  /* Text */
  --t1: #FFFFFF;
  --t2: rgba(255,255,255,.52);
  --t3: rgba(255,255,255,.3);
  /* Brand green (eToro DS confirmed) */
  --green:    #0EB12E;
  --green-hover: #0C9A27;
  /* Status */
  --ok:  #0EB12E;
  --err: #FF3B30;
  /* Border */
  --border: rgba(255,255,255,.1);
  /* Radius */
  --r-pill: 28px;
  --r-sheet: 16px;
  --r-sm: 8px;

  font-family: 'eToro Variable', 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0F; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
button { font-family: inherit; border: none; cursor: pointer; background: none; color: inherit; }

/* ─── Preview wrapper: single phone, centered ─── */
.preview-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 24px;
}
.screen-nav {
  display: flex; align-items: center; gap: 12px;
}
.nav-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.1); color: #fff; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .1s;
}
.nav-btn:hover { background: rgba(255,255,255,.18); }
.nav-btn:disabled { opacity: .3; cursor: default; }
.screen-label { font-size: 12px; color: rgba(255,255,255,.4); font-weight: 500; letter-spacing: .3px; min-width: 200px; text-align: center; }

/* ─── Phone frame: minimal, real aspect ─── */
.phone {
  width: 375px;
  /* iPhone 14 proportions: 375 × 812 logical */
  height: 812px;
  border-radius: 44px;
  border: 1px solid rgba(255,255,255,.12);
  overflow: hidden;
  position: relative;
  background: var(--exec-bg);
  box-shadow: 0 24px 64px rgba(0,0,0,.6);
}

/* Status bar */
.status-bar {
  height: 47px;
  background: var(--exec-bg);
  display: flex; align-items: flex-end;
  padding: 0 28px 10px;
  justify-content: space-between;
  position: relative; z-index: 10;
}
.status-time { font-size: 15px; font-weight: 600; color: var(--t1); }
.status-right { display: flex; align-items: center; gap: 6px; }
.status-icon { font-size: 12px; color: var(--t1); }

/* Screen container */
.screen {
  position: absolute;
  inset: 47px 0 0;
  background: var(--exec-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.screen.hidden { display: none; }

/* ─── Top bar ─── */
.exec-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 6px;
  flex-shrink: 0;
}
.exec-back {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--pill-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 300; color: var(--t1);
}
.exec-type-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 9px 16px; border-radius: var(--r-pill);
  background: var(--pill-bg);
  font-size: 14px; font-weight: 600; color: var(--t1);
}
.exec-type-pill .pill-chevron { font-size: 9px; opacity: .6; }

/* ─── Asset row (compact) ─── */
.exec-asset {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 0 20px 10px;
  flex-shrink: 0;
}
.asset-logo {
  width: 22px; height: 22px; border-radius: 6px;
  background: #1A1A2E; border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 6px; font-weight: 800; color: #fff;
  letter-spacing: -.5px;
}
.asset-ticker { font-size: 15px; font-weight: 600; color: var(--t1); }
.asset-sep { color: var(--t3); font-size: 13px; }
.asset-price { font-size: 15px; font-weight: 400; color: var(--t2); font-variant-numeric: tabular-nums; }

/* ─── Amount area ─── */
.exec-amount {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 20px 6px; flex: 1; justify-content: flex-start;
}
.amount-row {
  display: flex; align-items: flex-start; gap: 2px;
  margin-bottom: 12px;
}
.amount-sym {
  font-size: 24px; font-weight: 500; color: var(--t1);
  padding-top: 11px;
  font-family: 'Roboto', sans-serif;
}
.amount-num {
  font-size: 60px; font-weight: 400; color: var(--t1);
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'ss06' 1, 'lnum' 1, 'tnum' 1;
  letter-spacing: 0;
  line-height: 70px;
  font-family: 'eToro Variable', 'Inter', sans-serif;
}
.qty-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: var(--r-pill);
  background: var(--pill-bg);
  font-size: 14px; font-weight: 500; color: var(--t1);
  margin-bottom: 8px;
}
.qty-pill .refresh { opacity: .55; font-size: 13px; }
.avail {
  font-size: 13px; color: var(--t2);
}

/* ─── Keypad ─── */
.keypad {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  background: var(--exec-bg);
  flex-shrink: 0;
}
.k {
  height: 74px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 400; color: var(--t1);
  border-radius: var(--r-sm);
  transition: background .08s;
}
.k:active { background: rgba(255,255,255,.1); }
.k-dot { font-size: 32px; font-weight: 700; padding-bottom: 6px; }
.k-del svg { opacity: .8; }

/* ─── CTA ─── */
.exec-cta {
  padding: 10px 20px 32px;
  flex-shrink: 0;
  background: var(--exec-bg);
}
.cta-buy {
  width: 100%; height: 54px; border-radius: var(--r-pill);
  background: var(--green); color: #fff;
  font-size: 16px; font-weight: 600;
  font-family: 'eToro Variable', 'Inter', sans-serif;
  transition: background .12s;
}
.cta-buy:hover { background: var(--green-hover); }
.cta-buy:disabled {
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.35);
}

/* ─── Limit Order sheet (Screen 2) ─── */
.behind-dim {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 5;
}
.limit-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--sheet-bg);
  border-radius: var(--r-sheet) var(--r-sheet) 0 0;
  z-index: 10;
  display: flex; flex-direction: column;
  padding-bottom: 32px;
}
.sheet-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,.22);
  margin: 14px auto 16px;
  flex-shrink: 0;
}
.sheet-title {
  font-size: 18px; font-weight: 700; color: var(--t1);
  text-align: center; margin-bottom: 3px; flex-shrink: 0;
}
.sheet-sub {
  font-size: 13px; color: var(--t2);
  text-align: center; margin-bottom: 14px; flex-shrink: 0;
}
.sheet-display {
  font-size: 60px; font-weight: 400; color: var(--t1);
  text-align: center;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'ss06' 1, 'lnum' 1, 'tnum' 1;
  letter-spacing: 0; line-height: 70px;
  font-family: 'eToro Variable', 'Inter', sans-serif;
  min-height: 72px; padding: 0 20px;
  flex-shrink: 0;
}
.sheet-val {
  font-size: 11px; color: var(--ok);
  text-align: center; min-height: 16px;
  margin-bottom: 10px; flex-shrink: 0;
}
.sheet-val.err { color: var(--err); }
.sheet-keypad {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  background: var(--sheet-bg); flex: 1;
}
.sheet-keypad .k { height: 64px; font-size: 24px; }
.sheet-keypad .k:active { background: rgba(255,255,255,.07); }
.sheet-cta {
  padding: 10px 20px 0;
  flex-shrink: 0;
}
.sheet-set-btn {
  width: 100%; height: 54px; border-radius: var(--r-pill);
  background: var(--green); color: #fff;
  font-size: 16px; font-weight: 600;
  font-family: 'eToro Variable', 'Inter', sans-serif;
}
.sheet-set-btn:hover { background: var(--green-hover); }
.sheet-set-btn:disabled {
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.35);
}
</style>
</head>
<body>
<div class="preview-wrap">

  <!-- Nav controls -->
  <div class="screen-nav">
    <button class="nav-btn" id="prevBtn" onclick="showScreen(currentScreen-1)" disabled>←</button>
    <div class="screen-label" id="screenLabel">Screen 1 · Market Order</div>
    <button class="nav-btn" id="nextBtn" onclick="showScreen(currentScreen+1)">→</button>
  </div>

  <!-- Phone -->
  <div class="phone">
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-right">
        <span class="status-icon">●●●</span>
        <span class="status-icon">▮▮▮</span>
        <span class="status-icon" style="font-size:10px;">🔋</span>
      </div>
    </div>

    <!-- Screen 1: Market Order -->
    <div class="screen" id="screen-1">
      <div class="exec-top">
        <button class="exec-back">‹</button>
        <button class="exec-type-pill" onclick="showScreen(2)">
          Market Order <span class="pill-chevron">▾</span>
        </button>
      </div>
      <div class="exec-asset">
        <div class="asset-logo">AAPL</div>
        <span class="asset-ticker">AAPL</span>
        <span class="asset-sep">·</span>
        <span class="asset-price">$186.42</span>
      </div>
      <div class="exec-amount">
        <div class="amount-row">
          <span class="amount-sym">$</span>
          <span class="amount-num" id="mkt-num">10.00</span>
        </div>
        <button class="qty-pill">
          <span id="mkt-shares">~0.05 shares</span>
          <span class="refresh">⟳</span>
        </button>
        <span class="avail">Available: $12,440.00</span>
      </div>
      <div class="keypad">
        <button class="k" onclick="mKp('1')">1</button>
        <button class="k" onclick="mKp('2')">2</button>
        <button class="k" onclick="mKp('3')">3</button>
        <button class="k" onclick="mKp('4')">4</button>
        <button class="k" onclick="mKp('5')">5</button>
        <button class="k" onclick="mKp('6')">6</button>
        <button class="k" onclick="mKp('7')">7</button>
        <button class="k" onclick="mKp('8')">8</button>
        <button class="k" onclick="mKp('9')">9</button>
        <button class="k k-dot" onclick="mKp('.')">.</button>
        <button class="k" onclick="mKp('0')">0</button>
        <button class="k k-del" onclick="mKpDel()">
          <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><path d="M8 1L1 8L8 15M21 8H1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="exec-cta">
        <button class="cta-buy">Buy AAPL</button>
      </div>
    </div>

    <!-- Screen 2: Set Limit Order (sheet over dimmed screen 1) -->
    <div class="screen hidden" id="screen-2">
      <!-- Dimmed background -->
      <div class="exec-top" style="opacity:.4;pointer-events:none;">
        <button class="exec-back">‹</button>
        <button class="exec-type-pill">Market Order <span class="pill-chevron">▾</span></button>
      </div>
      <div class="exec-asset" style="opacity:.4;pointer-events:none;">
        <div class="asset-logo">AAPL</div>
        <span class="asset-ticker">AAPL</span>
        <span class="asset-sep">·</span>
        <span class="asset-price">$186.42</span>
      </div>
      <div class="exec-amount" style="opacity:.4;pointer-events:none;">
        <div class="amount-row">
          <span class="amount-sym">$</span>
          <span class="amount-num">10.00</span>
        </div>
        <button class="qty-pill">~0.05 shares <span class="refresh">⟳</span></button>
        <span class="avail">Available: $12,440.00</span>
      </div>
      <!-- Dim overlay -->
      <div class="behind-dim"></div>
      <!-- Sheet -->
      <div class="limit-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Set Limit order</div>
        <div class="sheet-sub">Current Ask Price: $186.45</div>
        <div class="sheet-display" id="limit-num">184.56</div>
        <div class="sheet-val" id="sheet-val-msg">✓ Below Ask · order rests at your price</div>
        <div class="sheet-keypad">
          <button class="k" onclick="lKp('1')">1</button>
          <button class="k" onclick="lKp('2')">2</button>
          <button class="k" onclick="lKp('3')">3</button>
          <button class="k" onclick="lKp('4')">4</button>
          <button class="k" onclick="lKp('5')">5</button>
          <button class="k" onclick="lKp('6')">6</button>
          <button class="k" onclick="lKp('7')">7</button>
          <button class="k" onclick="lKp('8')">8</button>
          <button class="k" onclick="lKp('9')">9</button>
          <button class="k k-dot" onclick="lKp('.')">.</button>
          <button class="k" onclick="lKp('0')">0</button>
          <button class="k k-del" onclick="lKpDel()">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none"><path d="M8 1L1 8L8 15M21 8H1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="sheet-cta">
          <button class="sheet-set-btn" id="set-limit-btn">Set limit</button>
        </div>
      </div>
    </div>

  </div><!-- /phone -->
</div><!-- /preview-wrap -->

<script>
var SCREENS = [
  { id: 'screen-1', label: 'Screen 1 · Market Order' },
  { id: 'screen-2', label: 'Screen 2 · Set Limit Order' }
];
var currentScreen = 0;

function showScreen(idx) {
  if (idx < 0 || idx >= SCREENS.length) return;
  document.getElementById(SCREENS[currentScreen].id).classList.add('hidden');
  currentScreen = idx;
  document.getElementById(SCREENS[currentScreen].id).classList.remove('hidden');
  document.getElementById('screenLabel').textContent = SCREENS[currentScreen].label;
  document.getElementById('prevBtn').disabled = currentScreen === 0;
  document.getElementById('nextBtn').disabled = currentScreen === SCREENS.length - 1;
}

/* Market keypad */
var mVal = '10.00';
function mKp(k) {
  if (k === '.' && mVal.includes('.')) return;
  if (mVal.includes('.') && mVal.split('.')[1].length >= 2) return;
  if (mVal === '0' && k !== '.') mVal = k;
  else mVal += k;
  var d = document.getElementById('mkt-num');
  var s = document.getElementById('mkt-shares');
  if (d) d.textContent = mVal;
  if (s) { var a = parseFloat(mVal); s.textContent = isNaN(a) ? '— shares' : '~' + (a/186.42).toFixed(2) + ' shares'; }
}
function mKpDel() {
  if (mVal.length <= 1) mVal = '0';
  else mVal = mVal.slice(0,-1);
  var d = document.getElementById('mkt-num');
  if (d) d.textContent = mVal;
}

/* Limit keypad */
var lVal = '184.56';
var ASK = 186.45;
function lKp(k) {
  if (k === '.' && lVal.includes('.')) return;
  if (lVal.includes('.') && lVal.split('.')[1].length >= 2) return;
  if (lVal === '0' && k !== '.') lVal = k;
  else lVal += k;
  var d = document.getElementById('limit-num');
  if (d) d.textContent = lVal;
  lValidate();
}
function lKpDel() {
  if (lVal.length <= 1) lVal = '0';
  else lVal = lVal.slice(0,-1);
  var d = document.getElementById('limit-num');
  if (d) d.textContent = lVal;
  lValidate();
}
function lValidate() {
  var p = parseFloat(lVal);
  var msg = document.getElementById('sheet-val-msg');
  var btn = document.getElementById('set-limit-btn');
  if (!msg) return;
  if (isNaN(p) || p <= 0) {
    msg.className = 'sheet-val err'; msg.textContent = 'Enter a valid price';
    if (btn) btn.disabled = true; return;
  }
  if (p > ASK * 1.02) {
    msg.className = 'sheet-val err';
    msg.textContent = '$' + p.toFixed(2) + ' exceeds Ask + 2% (' + (ASK*1.02).toFixed(2) + ')';
    if (btn) btn.disabled = true; return;
  }
  var pct = ((ASK-p)/ASK*100).toFixed(2);
  msg.className = 'sheet-val';
  msg.textContent = '✓ ' + pct + '% below Ask · rests at $' + p.toFixed(2);
  if (btn) btn.disabled = false;
}
lValidate();
</script>
</body>
</html>
